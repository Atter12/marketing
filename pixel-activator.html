<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>TikTok Pixel Activator | EcomTools</title>
    <meta name="description" content="Conecta tu TikTok Pixel y activa los 14 eventos. Directo y en segundos.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b4a;
            --primary-gradient: linear-gradient(135deg, #ff6b4a 0%, #ff8f6a 100%);
            --accent: #10b981;
            --text-dark: #1f2937;
            --text-medium: #6b7280;
            --text-light: #9ca3af;
            --bg: #fafafa;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 40px rgba(255, 107, 74, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        .logo span { color: var(--primary); }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-medium);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .back-link:hover { color: var(--primary); }

        /* Main: centrado, una columna */
        .main {
            max-width: 440px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .hero h1 span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 15px;
            color: var(--text-medium);
        }

        /* Card estado pixel */
        .pixel-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .pixel-card.connected {
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 24px rgba(16, 185, 129, 0.08);
        }
        .pixel-card.loading {
            opacity: 0.9;
            pointer-events: none;
        }
        .pixel-card .row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .pixel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-light);
        }
        .pixel-card.connected .pixel-dot {
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .pixel-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pixel-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        .pixel-id {
            font-size: 13px;
            color: var(--text-medium);
            font-family: ui-monospace, monospace;
        }
        .pixel-status {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            background: #f3f4f6;
            color: var(--text-medium);
        }
        .pixel-card.connected .pixel-status {
            background: #d1fae5;
            color: #065f46;
        }

        /* Input + Conectar */
        .input-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .input-row {
            display: flex;
            gap: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }
        .input-row input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .input-row input::placeholder {
            color: var(--text-light);
        }
        .btn-connect {
            padding: 14px 24px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-connect:hover {
            background: #374151;
        }
        .btn-connect:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* Activar 14 eventos */
        .btn-activate {
            width: 100%;
            padding: 18px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 74, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-activate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .btn-activate:disabled {
            background: #e5e7eb;
            color: var(--text-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Progress */
        .progress-wrap {
            margin-top: 24px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.35s ease;
            pointer-events: none;
        }
        .progress-wrap.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .progress-event {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .progress-count {
            font-size: 13px;
            color: var(--text-medium);
        }
        .progress-track {
            height: 6px;
            background: #f3f4f6;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            transition: width 0.25s ease-out;
        }
        .progress-bar.done {
            background: var(--accent);
        }
        .success-msg {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            padding: 16px;
            background: #f0fdf4;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(16, 185, 129, 0.3);
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.3s ease;
        }
        .success-msg.show {
            opacity: 1;
            transform: scale(1);
        }
        .success-msg .icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        .success-msg .text {
            font-size: 14px;
            font-weight: 600;
            color: #065f46;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            color: var(--text-light);
        }
        .footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                Ecom<span>Tools</span>
            </a>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Volver
            </a>
        </nav>
    </header>

    <main class="main">
        <div class="hero">
            <h1>TikTok <span>Pixel Activator</span></h1>
            <p>Conecta tu pixel y activa los 14 eventos. Sin pasos extra.</p>
        </div>

        <div class="pixel-card" id="pixelCard">
            <div class="row">
                <div class="pixel-dot"></div>
                <span class="pixel-label">Pixel</span>
            </div>
            <div class="pixel-name" id="pixelName">No conectado</div>
            <div class="pixel-id" id="pixelIdText">—</div>
            <div class="pixel-status" id="pixelStatus">Sin conexión</div>
        </div>

        <div class="input-card">
            <div class="input-row">
                <input type="text" id="pixelInput" placeholder="Pixel ID (ej. D60H1BRC77UD675I18NG)" autocomplete="off">
                <button type="button" class="btn-connect" id="btnConnect">Conectar</button>
            </div>
        </div>

        <button type="button" class="btn-activate" id="btnActivate" disabled>
            <i class="fas fa-bolt"></i>
            Activar 14 eventos
        </button>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-top">
                <span class="progress-event" id="currentEvent">—</span>
                <span class="progress-count" id="progressCount">0/14</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="success-msg" id="successMsg">
                <div class="icon"><i class="fas fa-check"></i></div>
                <span class="text" id="successText">14 eventos enviados</span>
            </div>
        </div>

        <p class="footer">
            Verificar en <a href="https://ads.tiktok.com/i18n/events_manager" target="_blank" rel="noopener">TikTok Events Manager</a> → Test Events
        </p>
    </main>

    <script>
        var pixelLoaded = false;
        var pixelInfo = { name: '', id: '' };

        var TIKTOK_EVENTS = [
            'ViewContent', 'ClickButton', 'Search', 'AddToWishlist',
            'AddToCart', 'InitiateCheckout', 'AddPaymentInfo', 'PlaceAnOrder',
            'CompletePayment', 'Subscribe', 'Contact', 'SubmitForm',
            'Download', 'CompleteRegistration'
        ];

        function fetchPixelInfo(pixelId) {
            return fetch('https://analytics.tiktok.com/i18n/pixel/config.js?sdkid=' + encodeURIComponent(pixelId) + '&verifyDomain=true&lib=ttq&t=' + Date.now())
                .then(function(res) { return res.ok ? res.text() : Promise.reject(new Error('Not found')); })
                .then(function(text) {
                    var name = null;
                    var m = text.match(/"pixel_name"\s*:\s*"([^"]+)"/);
                    if (m) name = m[1];
                    if (!name) { m = text.match(/"display_name"\s*:\s*"([^"]+)"/); if (m) name = m[1]; }
                    if (!name) { m = text.match(/"advertiser_name"\s*:\s*"([^"]+)"/); if (m) name = m[1]; }
                    if (!name) { m = text.match(/"name"\s*:\s*"([^"]+)"/); if (m) name = m[1]; }
                    if (text.indexOf(pixelId) !== -1 || text.length > 200) {
                        return { name: name || 'Pixel ' + pixelId.substring(0, 8), id: pixelId };
                    }
                    return Promise.reject(new Error('Invalid'));
                })
                .catch(function() {
                    return new Promise(function(resolve) {
                        var script = document.createElement('script');
                        script.src = 'https://analytics.tiktok.com/i18n/pixel/events.js?sdkid=' + encodeURIComponent(pixelId) + '&lib=ttq&t=' + Date.now();
                        var t = setTimeout(function() { script.remove(); resolve({ name: 'Pixel ' + pixelId.substring(0, 8), id: pixelId }); }, 3000);
                        script.onload = function() { clearTimeout(t); script.remove(); resolve({ name: 'Pixel ' + pixelId.substring(0, 8), id: pixelId }); };
                        script.onerror = function() { clearTimeout(t); script.remove(); resolve({ name: 'Pixel ' + pixelId.substring(0, 8), id: pixelId }); };
                        document.head.appendChild(script);
                    });
                });
        }

        function loadPixel() {
            var pixelId = document.getElementById('pixelInput').value.trim();
            if (!pixelId) return;

            var card = document.getElementById('pixelCard');
            var nameEl = document.getElementById('pixelName');
            var idEl = document.getElementById('pixelIdText');
            var statusEl = document.getElementById('pixelStatus');
            var btnConnect = document.getElementById('btnConnect');
            var btnActivate = document.getElementById('btnActivate');

            card.classList.remove('connected');
            card.classList.add('loading');
            nameEl.textContent = 'Conectando...';
            idEl.textContent = pixelId;
            statusEl.textContent = 'Verificando';
            btnConnect.disabled = true;

            fetchPixelInfo(pixelId).then(function(info) {
                var oldScript = document.getElementById('ttPixelScript');
                if (oldScript) oldScript.remove();
                document.querySelectorAll('script[src*="analytics.tiktok.com"]').forEach(function(s) { s.remove(); });
                if (window.ttq) delete window.ttq;

                !function(w,d,t){
                    w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"];ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=i;ttq._t=ttq._t||{};ttq._t[e]=+new Date;ttq._o=ttq._o||{};ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript";o.async=!0;o.id="ttPixelScript";o.src=i+"?sdkid="+e+"&lib="+t;var a=d.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};ttq.load(pixelId);ttq.page();
                }(window,document,'ttq');

                pixelLoaded = true;
                pixelInfo = { name: info.name, id: pixelId };

                card.classList.remove('loading');
                card.classList.add('connected');
                nameEl.textContent = info.name;
                statusEl.textContent = 'Conectado';
                btnActivate.disabled = false;

                document.getElementById('progressWrap').classList.remove('show');
                document.getElementById('successMsg').classList.remove('show');
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressBar').classList.remove('done');

                try { localStorage.setItem('ttPixelId', pixelId); } catch (e) {}
            }).catch(function() {
                card.classList.remove('loading');
                nameEl.textContent = 'Error de conexión';
                statusEl.textContent = 'No encontrado';
                idEl.textContent = pixelId;
            }).then(function() {
                btnConnect.disabled = false;
            });
        }

        function fireAllEvents() {
            if (!pixelLoaded || typeof ttq === 'undefined') return;

            var params = { value: 0, currency: 'USD', content_id: 'test', content_type: 'product', email: 'test@example.com', phone: '+1234567890' };

            var wrap = document.getElementById('progressWrap');
            var bar = document.getElementById('progressBar');
            var currentEl = document.getElementById('currentEvent');
            var countEl = document.getElementById('progressCount');
            var successEl = document.getElementById('successMsg');
            var textEl = document.getElementById('successText');
            var btnActivate = document.getElementById('btnActivate');

            wrap.classList.add('show');
            successEl.classList.remove('show');
            bar.classList.remove('done');
            bar.style.width = '0%';
            btnActivate.disabled = true;

            var completed = 0;
            var total = TIKTOK_EVENTS.length;

            TIKTOK_EVENTS.forEach(function(eventName, i) {
                setTimeout(function() {
                    try { ttq.track(eventName, params); } catch (e) {}
                    completed++;
                    bar.style.width = (completed / total) * 100 + '%';
                    currentEl.textContent = eventName;
                    countEl.textContent = completed + '/' + total;

                    if (completed === total) {
                        setTimeout(function() {
                            bar.classList.add('done');
                            currentEl.textContent = 'Completado';
                            textEl.textContent = '14 eventos enviados a ' + pixelInfo.name;
                            successEl.classList.add('show');
                            btnActivate.disabled = false;
                        }, 200);
                    }
                }, i * 120);
            });
        }

        document.getElementById('btnConnect').addEventListener('click', loadPixel);
        document.getElementById('btnActivate').addEventListener('click', fireAllEvents);
        document.getElementById('pixelInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadPixel();
        });

        var saved = localStorage.getItem('ttPixelId');
        if (saved) document.getElementById('pixelInput').value = saved;
    </script>
</body>
</html>
