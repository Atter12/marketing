<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Recurso no disponible</title>
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f3ee;
      color: #1f2937;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: #6b7280;
      line-height: 1.55;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 — Recurso no disponible</h1>
    <p>La ruta solicitada no está disponible en este dominio.</p>
  </main>
</body>
</html>
