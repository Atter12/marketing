<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Tareas | Holistic Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;-webkit-font-smoothing:antialiased;}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#111827;min-height:100vh;display:flex;flex-direction:column;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:72px;flex-shrink:0;}
    .header-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
    .header-logo-text{font-size:18px;font-weight:600;color:#111827;letter-spacing:-0.01em;}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px;}
    .form-wrapper{width:100%;max-width:448px;}
    .form-heading{font-size:30px;font-weight:600;color:#000;line-height:1.2;margin-bottom:8px;}
    .form-subtitle{font-size:16px;font-weight:400;color:#6B7280;line-height:1.5;margin-bottom:32px;}
    .input-group{margin-bottom:16px;}
    .input-field{width:100%;height:44px;padding:0 14px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;font-family:inherit;font-size:16px;color:#111827;outline:none;box-sizing:border-box;}
    .input-field:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
    .btn{width:100%;height:44px;border:none;border-radius:8px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;background:#3B82F6;color:#fff;}
    .btn:hover{background:#2563EB;}
    .btn:disabled{background:#9CA3AF;cursor:not-allowed;}
    .hint-text{font-size:14px;color:#9CA3AF;text-align:center;margin-top:12px;line-height:1.5;}
    .success-box{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:12px 14px;background:#ECFDF5;color:#059669;border-radius:8px;font-size:14px;}
    .error-box{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:12px 14px;background:#FEF2F2;color:#DC2626;border-radius:8px;font-size:14px;}
    .footer{padding:20px 0;text-align:center;font-size:13px;color:#9CA3AF;}
    .method-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;background:#F9FAFB;}
    .method-tab{flex:1;padding:10px 16px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:500;color:#6B7280;cursor:pointer;}
    .method-tab.active{background:#fff;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
    .code-step{display:none;}
    .code-step.show{display:block;}
    .email-step.hide{display:none;}
    .code-input{text-align:center;letter-spacing:6px;font-size:20px;}
  </style>
</head>
<body>
  <header class="header">
    <a href="/tareas" class="header-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden><rect width="28" height="28" rx="6" fill="#3B82F6"/><path d="M9 8v12M19 8v12M9 14h10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span class="header-logo-text">Holistic Marketing</span>
    </a>
  </header>
  <main class="main">
    <div class="form-wrapper">
      <h1 class="form-heading">Iniciar sesión</h1>
      <p class="form-subtitle">Ingresa tu correo para acceder a Tareas.</p>
      <div id="successBox" class="success-box" style="display:none;">
        <span id="successText">Revisá tu correo. Abrí el enlace para entrar a Tareas.</span>
      </div>
      <div id="emailStep" class="email-step">
        <div class="method-tabs">
          <button type="button" id="tabLink" class="method-tab active">Enlace al correo</button>
          <button type="button" id="tabCode" class="method-tab">Código de 6 dígitos</button>
        </div>
        <form id="form">
          <div id="errorBox" class="error-box" style="display:none;"></div>
          <div class="input-group">
            <input type="email" id="email" class="input-field" placeholder="Correo electrónico" required autocomplete="email" />
          </div>
          <button type="submit" id="btn" class="btn">Enviar enlace al correo</button>
        </form>
        <p class="hint-text" id="hintText">Recibirás un enlace en tu correo para acceder.</p>
      </div>
      <div id="codeStep" class="code-step">
        <p class="form-subtitle" style="margin-bottom:16px;">Ingresá el código de 6 dígitos que te enviamos por correo.</p>
        <form id="formCode">
          <div id="errorBoxCode" class="error-box" style="display:none;"></div>
          <div class="input-group">
            <input type="text" id="code" class="input-field code-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
          </div>
          <button type="submit" id="btnCode" class="btn">Verificar código</button>
        </form>
        <p class="hint-text"><button type="button" id="backToEmail" style="background:none;border:none;color:#3B82F6;cursor:pointer;padding:0;font:inherit;text-decoration:underline;">Volver a ingresar correo</button></p>
      </div>
    </div>
  </main>
  <footer class="footer">© 2026 Holistic Marketing</footer>
  <script src="/credito-app/auth-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (function() {
      var url = window.__SUPABASE_URL__;
      var key = window.__SUPABASE_ANON_KEY__;
      if (!url || !key) {
        document.getElementById('errorBox').style.display = 'flex';
        document.getElementById('errorBox').textContent = 'Configuración no disponible.';
        return;
      }
      var supabase = window.supabase.createClient(url, key);
      var hash = window.location.hash || '';
      if (hash.indexOf('access_token') !== -1) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif;color:#6B7280;">Entrando a Tareas…</div>';
        var params = {};
        hash.slice(1).split('&').forEach(function(p) {
          var kv = p.split('=');
          if (kv[0] && kv[1]) params[kv[0]] = decodeURIComponent(kv[1]);
        });
        if (params.access_token && params.refresh_token) {
          supabase.auth.setSession({ access_token: params.access_token, refresh_token: params.refresh_token })
            .then(function() { window.location.replace('/tareas'); })
            .catch(function() { window.location.replace('/acceso-tareas'); });
        } else {
          window.location.replace('/tareas');
        }
        return;
      }
      var redirectTo = window.location.origin + '/tareas';
      var method = 'link';
      var emailStep = document.getElementById('emailStep');
      var codeStep = document.getElementById('codeStep');
      var successBox = document.getElementById('successBox');
      var successText = document.getElementById('successText');
      var hintText = document.getElementById('hintText');
      var btnEl = document.getElementById('btn');

      document.getElementById('tabLink').onclick = function() {
        method = 'link';
        document.getElementById('tabLink').classList.add('active');
        document.getElementById('tabCode').classList.remove('active');
        btnEl.textContent = 'Enviar enlace al correo';
        hintText.textContent = 'Recibirás un enlace en tu correo para acceder.';
      };
      document.getElementById('tabCode').onclick = function() {
        method = 'code';
        document.getElementById('tabCode').classList.add('active');
        document.getElementById('tabLink').classList.remove('active');
        btnEl.textContent = 'Enviar código al correo';
        hintText.textContent = 'Recibirás un código de 6 dígitos para ingresar acá.';
      };

      document.getElementById('form').onsubmit = function(e) {
        e.preventDefault();
        var emailEl = document.getElementById('email');
        var errorBox = document.getElementById('errorBox');
        var email = (emailEl.value || '').trim();
        if (!email || email.indexOf('@') === -1) {
          errorBox.style.display = 'flex';
          errorBox.textContent = 'Indicá un correo válido.';
          return;
        }
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        btnEl.disabled = true;
        btnEl.textContent = 'Enviando…';
        var body = { email: email, method: method };
        if (method === 'link') body.redirect_to = redirectTo;
        supabase.functions.invoke('magic-link-login', { body: body })
          .then(function(r) {
            var data = r.data && (r.data.data || r.data);
            var err = r.error || (data && data.error);
            if (err) {
              errorBox.style.display = 'flex';
              errorBox.textContent = err.message || err || (method === 'link' ? 'Error al enviar el enlace.' : 'Error al verificar el correo.');
              btnEl.disabled = false;
              btnEl.textContent = method === 'link' ? 'Enviar enlace al correo' : 'Enviar código al correo';
              return;
            }
            if (method === 'code') {
              return supabase.auth.signInWithOtp({ email: email, options: { shouldCreateUser: false } })
                .then(function() {
                  emailStep.classList.add('hide');
                  codeStep.classList.add('show');
                  document.getElementById('code').value = '';
                  document.getElementById('errorBoxCode').style.display = 'none';
                })
                .catch(function(otpErr) {
                  errorBox.style.display = 'flex';
                  errorBox.textContent = otpErr.message || 'Error al enviar el código.';
                  btnEl.disabled = false;
                  btnEl.textContent = 'Enviar código al correo';
                });
            }
            successBox.style.display = 'flex';
            successText.textContent = 'Revisá tu correo. Abrí el enlace para entrar a Tareas.';
            btnEl.disabled = false;
            btnEl.textContent = 'Enviar enlace al correo';
          })
          .catch(function(err) {
            errorBox.style.display = 'flex';
            errorBox.textContent = err.message || (method === 'link' ? 'Error al enviar el enlace.' : 'Error al enviar el código.');
            btnEl.disabled = false;
            btnEl.textContent = method === 'link' ? 'Enviar enlace al correo' : 'Enviar código al correo';
          });
      };

      document.getElementById('formCode').onsubmit = function(e) {
        e.preventDefault();
        var email = (document.getElementById('email').value || '').trim();
        var code = (document.getElementById('code').value || '').trim().replace(/\s/g, '');
        var errorBoxCode = document.getElementById('errorBoxCode');
        var btnCode = document.getElementById('btnCode');
        if (!code || code.length < 4) {
          errorBoxCode.style.display = 'flex';
          errorBoxCode.textContent = 'Ingresá el código de 6 dígitos.';
          return;
        }
        errorBoxCode.style.display = 'none';
        btnCode.disabled = true;
        btnCode.textContent = 'Verificando…';
        supabase.auth.verifyOtp({ email: email, token: code, type: 'email' })
          .then(function() { window.location.replace('/tareas'); })
          .catch(function(err) {
            errorBoxCode.style.display = 'flex';
            errorBoxCode.textContent = err.message || 'Código inválido o expirado.';
            btnCode.disabled = false;
            btnCode.textContent = 'Verificar código';
          });
      };

      document.getElementById('backToEmail').onclick = function() {
        codeStep.classList.remove('show');
        emailStep.classList.remove('hide');
      };
    })();
  </script>
</body>
</html>
