<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Analizador de Rendimiento Web | Velocidad y Performance | EcomTools</title>
    <meta name="description" content="Evalúa el rendimiento de cualquier página web por URL: velocidad, Core Web Vitals y métricas de experiencia.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b4a;
            --primary-light: #ff8a6a;
            --primary-gradient: linear-gradient(135deg, #ff6b4a 0%, #ff8f6a 100%);
            --secondary: #6366f1;
            --accent: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --text-dark: #1f2937;
            --text-medium: #6b7280;
            --text-light: #9ca3af;
            --bg-white: #ffffff;
            --bg-cream: #fffbf8;
            --bg-gray: #f8f9fa;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 40px rgba(255, 107, 74, 0.15);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .logo span { color: var(--primary); }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-medium);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }

        .hero-section {
            padding: 48px 24px 36px;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-cream) 0%, var(--bg-white) 100%);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .hero-badge i { color: var(--primary); }

        .hero-section h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero-section h1 span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: 16px;
            color: var(--text-medium);
            max-width: 560px;
            margin: 0 auto;
        }

        .analyzer-section {
            padding: 24px 24px 80px;
            background: var(--bg-white);
        }

        .input-card {
            background: var(--bg-white);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
        }

        .input-card h2 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-medium);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-card h2 i { color: var(--primary); }

        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-row input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.12);
        }

        .input-row input::placeholder { color: var(--text-light); }

        .btn-analyze {
            padding: 14px 28px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 74, 0.35);
        }

        .btn-analyze:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-analyze .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .msg {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .msg.error { color: var(--accent-red); }

        .msg.success { color: var(--accent); }

        .results-wrap {
            display: none;
            margin-top: 8px;
        }

        .results-wrap.visible { display: block; }

        .device-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .device-tab {
            padding: 12px 20px;
            background: var(--bg-gray);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-medium);
            cursor: pointer;
            transition: all 0.2s;
        }

        .device-tab:hover { color: var(--text-dark); }

        .device-tab.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .result-panel {
            display: none;
        }

        .result-panel.active { display: block; }

        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .score-circle-wrap {
            text-align: center;
            padding: 20px 12px;
            background: var(--bg-gray);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .score-circle-wrap h3 {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-medium);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: white;
        }

        .score-circle.good { background: var(--accent); }

        .score-circle.medium { background: var(--accent-amber); }

        .score-circle.bad { background: var(--accent-red); }

        .score-circle.na { background: var(--text-light); }

        .vitals-card {
            background: var(--bg-white);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        .vitals-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vitals-card h3 i { color: var(--secondary); }

        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .vital-item {
            padding: 14px 16px;
            background: var(--bg-gray);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .vital-item .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 4px;
        }

        .vital-item .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .analyzed-url {
            font-size: 13px;
            color: var(--text-medium);
            margin-bottom: 20px;
            word-break: break-all;
        }

        .analyzed-url strong { color: var(--text-dark); }

        @media (max-width: 640px) {
            .input-row { flex-direction: column; }
            .input-row input { min-width: 100%; }
            .scores-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                    Ecom<span>Tools</span>
                </a>
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Volver a herramientas
                </a>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <div class="hero-badge">
                <i class="fas fa-tachometer-alt"></i>
                Velocidad y experiencia de usuario
            </div>
            <h1>Analizador de <span>Rendimiento Web</span></h1>
            <p>Evalúa la velocidad y el rendimiento de cualquier página por URL. Métricas claras para móvil y escritorio.</p>
        </div>
    </section>

    <section class="analyzer-section">
        <div class="container">
            <div class="input-card">
                <h2><i class="fas fa-link"></i> URL a analizar</h2>
                <div class="input-row">
                    <input type="url" id="urlInput" placeholder="https://ejemplo.com" autocomplete="url">
                    <button type="button" class="btn-analyze" id="btnAnalyze">
                        <i class="fas fa-play" id="btnIcon"></i>
                        <span id="btnText">Analizar</span>
                    </button>
                </div>
                <div class="msg" id="msg" role="alert" aria-live="polite"></div>
            </div>

            <div class="results-wrap" id="resultsWrap">
                <p class="analyzed-url">Analizando: <strong id="analyzedUrl"></strong></p>
                <div class="device-tabs">
                    <button type="button" class="device-tab active" data-device="mobile">
                        <i class="fas fa-mobile-alt"></i> Móvil
                    </button>
                    <button type="button" class="device-tab" data-device="desktop">
                        <i class="fas fa-laptop"></i> Escritorio
                    </button>
                </div>

                <div class="result-panel active" id="panelMobile">
                    <div class="scores-grid" id="scoresMobile"></div>
                    <div class="vitals-card">
                        <h3><i class="fas fa-heartbeat"></i> Métricas principales</h3>
                        <div class="vitals-grid" id="vitalsMobile"></div>
                    </div>
                </div>

                <div class="result-panel" id="panelDesktop">
                    <div class="scores-grid" id="scoresDesktop"></div>
                    <div class="vitals-card">
                        <h3><i class="fas fa-heartbeat"></i> Métricas principales</h3>
                        <div class="vitals-grid" id="vitalsDesktop"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        (function () {
            const urlInput = document.getElementById('urlInput');
            const btnAnalyze = document.getElementById('btnAnalyze');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');
            const msg = document.getElementById('msg');
            const resultsWrap = document.getElementById('resultsWrap');
            const analyzedUrlEl = document.getElementById('analyzedUrl');
            const scoresMobile = document.getElementById('scoresMobile');
            const scoresDesktop = document.getElementById('scoresDesktop');
            const vitalsMobile = document.getElementById('vitalsMobile');
            const vitalsDesktop = document.getElementById('vitalsDesktop');

            const categoryLabels = {
                performance: 'Rendimiento',
                accessibility: 'Accesibilidad',
                'best-practices': 'Buenas prácticas',
                seo: 'SEO'
            };

            function scoreClass(score) {
                if (score == null) return 'na';
                if (score >= 90) return 'good';
                if (score >= 50) return 'medium';
                return 'bad';
            }

            function renderScores(container, data) {
                if (!data || !data.categories) {
                    container.innerHTML = '<p style="color: var(--text-medium);">Sin datos</p>';
                    return;
                }
                const html = [];
                for (const [id, score] of Object.entries(data.categories)) {
                    const label = categoryLabels[id] || id;
                    const cls = scoreClass(score);
                    const value = score != null ? score : '—';
                    html.push(
                        '<div class="score-circle-wrap">',
                        '<h3>' + escapeHtml(label) + '</h3>',
                        '<div class="score-circle ' + cls + '">' + value + '</div>',
                        '</div>'
                    );
                }
                container.innerHTML = html.join('');
            }

            const auditLabels = {
                'first-contentful-paint': 'Primera pintura (FCP)',
                'largest-contentful-paint': 'Mayor pintura (LCP)',
                'cumulative-layout-shift': 'Cambio de diseño (CLS)',
                'total-blocking-time': 'Tiempo bloqueante (TBT)',
                'speed-index': 'Índice de velocidad',
                'interactive': 'Interactivo (TTI)',
                'max-potential-fid': 'FID'
            };

            function renderVitals(container, data) {
                if (!data || !data.audits) {
                    container.innerHTML = '<p style="color: var(--text-medium);">Sin métricas</p>';
                    return;
                }
                const html = [];
                for (const [id, audit] of Object.entries(data.audits)) {
                    if (!audit) continue;
                    const label = auditLabels[id] || id;
                    const value = audit.displayValue || (audit.score != null ? audit.score + '%' : '—');
                    html.push(
                        '<div class="vital-item">',
                        '<div class="label">' + escapeHtml(label) + '</div>',
                        '<div class="value">' + escapeHtml(String(value)) + '</div>',
                        '</div>'
                    );
                }
                container.innerHTML = html.join('');
            }

            function escapeHtml(s) {
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function setLoading(loading) {
                btnAnalyze.disabled = loading;
                if (loading) {
                    btnIcon.className = 'spinner';
                    btnIcon.style.display = 'block';
                    btnText.textContent = 'Analizando…';
                } else {
                    btnIcon.className = 'fas fa-play';
                    btnIcon.style.display = 'inline-block';
                    btnText.textContent = 'Analizar';
                }
            }

            function showMsg(text, isError) {
                msg.textContent = text;
                msg.className = 'msg' + (text ? (isError ? ' error' : ' success') : '');
            }

            document.querySelectorAll('.device-tab').forEach(function (tab) {
                tab.addEventListener('click', function () {
                    document.querySelectorAll('.device-tab').forEach(function (t) { t.classList.remove('active'); });
                    document.querySelectorAll('.result-panel').forEach(function (p) { p.classList.remove('active'); });
                    tab.classList.add('active');
                    var device = tab.getAttribute('data-device');
                    document.getElementById('panel' + (device === 'mobile' ? 'Mobile' : 'Desktop')).classList.add('active');
                });
            });

            btnAnalyze.addEventListener('click', function () {
                var raw = (urlInput.value || '').trim();
                if (!raw) {
                    showMsg('Escribe la URL de la página que quieres analizar.', true);
                    urlInput.focus();
                    return;
                }
                var url;
                try {
                    url = new URL(raw);
                } catch (_) {
                    showMsg('URL no válida. Usa https:// o http://', true);
                    return;
                }
                if (!['http:', 'https:'].includes(url.protocol)) {
                    showMsg('La URL debe ser http o https.', true);
                    return;
                }

                showMsg('');
                resultsWrap.classList.remove('visible');
                setLoading(true);

                var apiUrl = '/api/performance-analyzer/analyze?url=' + encodeURIComponent(url.href);

                fetch(apiUrl)
                    .then(function (res) {
                        return res.json().then(function (body) {
                            if (!res.ok) throw new Error(body.error || 'Error al analizar');
                            return body;
                        });
                    })
                    .then(function (body) {
                        if (!body.success || !body.data) throw new Error('Respuesta inválida');
                        var data = body.data;
                        analyzedUrlEl.textContent = data.url || url.href;
                        renderScores(scoresMobile, data.mobile);
                        renderScores(scoresDesktop, data.desktop);
                        renderVitals(vitalsMobile, data.mobile);
                        renderVitals(vitalsDesktop, data.desktop);
                        resultsWrap.classList.add('visible');
                        showMsg('Análisis completado.', false);
                    })
                    .catch(function (err) {
                        showMsg(err.message || 'No se pudo analizar. Intenta de nuevo.', true);
                    })
                    .finally(function () {
                        setLoading(false);
                    });
            });
        })();
    </script>
</body>
</html>
