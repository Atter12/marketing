<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Activator — TikTok</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --surface: rgba(255,255,255,0.022);
            --glass: rgba(255,255,255,0.032);
            --glass-b: rgba(255,255,255,0.06);
            --glass-bh: rgba(255,255,255,0.11);
            --text: #e8e8eb;
            --text-2: #6d6d76;
            --text-3: #38383f;
            --red: #fe2c55;
            --cyan: #25f4ee;
            --green: #22c55e;
            --amber: #f59e0b;
            --violet: #8b5cf6;
            --green-g: rgba(34,197,94,0.1);
            --red-g: rgba(254,44,85,0.08);
            --cyan-g: rgba(37,244,238,0.06);
        }

        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        canvas { position:fixed; inset:0; pointer-events:none; }
        #bg { z-index:0; }
        #fx { z-index:100; }

        body::after {
            content:'';
            position:fixed; inset:0; z-index:1;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.02'/%3E%3C/svg%3E");
            pointer-events:none;
        }

        ::selection { background: rgba(37,244,238,0.18); color: #fff; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--text-3); border-radius:2px; }

        /* ════════════════════ LAYOUT ════════════════════ */
        .app {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
        }

        /* ════════════════════ BRAND ════════════════════ */
        .brand {
            text-align: center;
            margin-bottom: 32px;
            opacity:0;
            animation: up .8s cubic-bezier(.16,1,.3,1) .1s forwards;
        }

        .logo-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            margin-bottom: 16px;
        }

        .logo-orb {
            position: absolute;
            width: 90px; height: 90px;
            border-radius: 50%;
            top:50%; left:50%;
            transform: translate(-50%,-50%);
            filter: blur(28px);
            opacity: .12;
            pointer-events: none;
            animation: orbDrift 5s ease-in-out infinite;
        }

        .logo-orb.a { background: var(--red); }
        .logo-orb.b { background: var(--cyan); animation-delay: 2.5s; }

        /* Ring SVG */
        .logo-ring {
            position: absolute; inset: -4px;
            opacity: 0;
            transition: opacity .6s;
        }

        .logo-ring.on { opacity: 1; }

        .logo-ring svg {
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }

        .logo-ring circle { fill:none; stroke-linecap:round; }
        .logo-ring .trk { stroke:rgba(255,255,255,0.04); stroke-width:2; }
        .logo-ring .fil {
            stroke: url(#rGrad);
            stroke-width: 2.5;
            stroke-dasharray: 220;
            stroke-dashoffset: 220;
            transition: stroke-dashoffset .18s ease-out;
            filter: drop-shadow(0 0 4px rgba(37,244,238,0.35));
        }

        .logo-box {
            position: relative;
            width: 48px; height: 48px;
            background: linear-gradient(145deg, #111114, #0a0a0c);
            border: 1px solid var(--glass-b);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 8px 32px rgba(0,0,0,.5),
                inset 0 1px 0 rgba(255,255,255,.05);
            transition: border-color .5s, box-shadow .5s;
            z-index: 1;
        }

        .logo-box.glow {
            border-color: rgba(34,197,94,.25);
            box-shadow:
                0 0 24px rgba(34,197,94,.06),
                0 8px 32px rgba(0,0,0,.4),
                inset 0 1px 0 rgba(255,255,255,.05);
        }

        .logo-box svg { width:22px; height:22px; }

        /* Shockwave */
        .shockwave {
            position: absolute;
            inset: -8px;
            border-radius: 18px;
            border: 2px solid var(--green);
            opacity: 0;
            pointer-events: none;
        }

        .shockwave.fire {
            animation: shock .7s cubic-bezier(.16,1,.3,1) forwards;
        }

        .brand h1 {
            font-size: 23px;
            font-weight: 800;
            letter-spacing: -.6px;
            line-height: 1.1;
        }

        .brand h1 em {
            font-style: normal;
            background: linear-gradient(90deg, var(--cyan) 20%, var(--red) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .sub {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 5px;
            font-weight: 400;
        }

        /* ════════════════════ GLASS CARDS ════════════════════ */
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-b);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 8px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 16px rgba(0,0,0,.15);
            transition: border-color .4s, box-shadow .4s;
            opacity: 0;
        }

        .card:hover { border-color: var(--glass-bh); }

        .c1 { animation: up .7s cubic-bezier(.16,1,.3,1) .22s forwards; }
        .c2 { animation: up .7s cubic-bezier(.16,1,.3,1) .3s forwards; }

        .card.live {
            border-color: rgba(34,197,94,.12);
        }

        /* ════════════════════ STATUS ════════════════════ */
        .sts { display:flex; align-items:center; gap:12px; }

        .sts-orb {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,.025);
            border: 1px solid var(--glass-b);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .5s;
            position: relative;
            overflow: hidden;
        }

        .sts-orb::after {
            content:'';
            position:absolute; inset:0;
            background: radial-gradient(circle, var(--green-g), transparent 70%);
            opacity:0; transition:opacity .5s;
        }

        .sts-orb.on { border-color:rgba(34,197,94,.2); }
        .sts-orb.on::after { opacity:1; }

        .sts-dot {
            width:7px; height:7px; border-radius:50%;
            background:var(--text-3);
            transition: all .4s; position:relative; z-index:1;
        }

        .sts-orb.on .sts-dot {
            background:var(--green);
            box-shadow: 0 0 6px var(--green), 0 0 16px rgba(34,197,94,.2);
            animation: pulse 2.5s ease infinite;
        }

        .sts-body { flex:1; min-width:0; }

        .sts-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -.15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sts-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: default;
        }

        .sts-id .copy-btn {
            opacity: 0;
            font-size: 10px;
            color: var(--cyan);
            cursor: pointer;
            transition: opacity .2s;
        }

        .sts:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { text-decoration: underline; }

        .sts-tag {
            font-size: 9.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 3.5px 9px;
            border-radius: 5px;
            background: rgba(255,255,255,.03);
            color: var(--text-3);
            border: 1px solid rgba(255,255,255,.04);
            flex-shrink: 0;
            transition: all .4s;
        }

        .sts-tag.on {
            background:var(--green-g);
            color:var(--green);
            border-color:rgba(34,197,94,.15);
        }

        /* ════════════════════ INPUT ════════════════════ */
        .inp-row { display:flex; gap:7px; }

        .inp {
            flex:1;
            padding: 12px 14px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--glass-b);
            border-radius: 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: all .25s;
        }

        .inp:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px var(--cyan-g), 0 0 20px rgba(37,244,238,.03);
            background: rgba(255,255,255,.035);
        }

        .inp::placeholder { color:var(--text-3); }

        .inp.err { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-g); }

        .inp-hint {
            font-size: 10.5px;
            color: var(--text-3);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all .3s;
        }

        .inp-hint.show { opacity:1; height:16px; }
        .inp-hint.err { color: var(--red); }
        .inp-hint .dot { width:4px; height:4px; border-radius:50%; background:currentColor; }

        /* Last activation */
        .last-fire {
            font-size: 10.5px;
            color: var(--text-3);
            margin-top: 8px;
            font-family: 'IBM Plex Mono', monospace;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all .3s;
        }

        .last-fire.show { opacity:1; height:16px; }

        /* ════════════════════ BUTTONS ════════════════════ */
        .btn {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all .2s cubic-bezier(.16,1,.3,1);
            position: relative;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn .rip {
            position:absolute; border-radius:50%;
            background:rgba(255,255,255,.12);
            transform:scale(0);
            animation: rip .55s ease-out forwards;
            pointer-events:none;
        }

        .btn-s {
            padding: 12px 20px;
            background: rgba(255,255,255,.05);
            color: var(--text);
            border: 1px solid var(--glass-b);
            font-size: 13px;
        }

        .btn-s:hover { background:rgba(255,255,255,.08); border-color:var(--glass-bh); }
        .btn-s:disabled { opacity:.3; cursor:not-allowed; }

        .btn-s.ld { color:transparent; pointer-events:none; }

        .btn-s.ld::after {
            content:''; position:absolute;
            width:15px; height:15px;
            border:2px solid var(--text-3); border-top-color:var(--text);
            border-radius:50%; animation:spin .5s linear infinite;
            top:50%; left:50%; transform:translate(-50%,-50%);
        }

        /* CTA */
        .cta {
            width:100%;
            padding: 16px;
            font-size: 14.5px;
            letter-spacing: -.2px;
            color: #fff;
            background: linear-gradient(135deg, var(--red), #d6234a);
            box-shadow:
                0 0 0 1px rgba(254,44,85,.2),
                0 4px 16px rgba(254,44,85,.15);
            margin-top: 4px;
            border-radius: 12px;
            opacity:0;
            animation: up .7s cubic-bezier(.16,1,.3,1) .38s forwards;
        }

        .cta:hover:not(:disabled) {
            transform: translateY(-1.5px);
            box-shadow:
                0 0 0 1px rgba(254,44,85,.3),
                0 8px 28px rgba(254,44,85,.22),
                0 0 60px rgba(254,44,85,.05);
        }

        .cta:active:not(:disabled) { transform:translateY(0); }

        .cta:disabled {
            background: rgba(255,255,255,.03);
            color: var(--text-3);
            box-shadow: 0 0 0 1px var(--glass-b);
            cursor: not-allowed;
            transform: none;
        }

        .cta-in {
            display:flex; align-items:center; justify-content:center;
            gap:8px; position:relative; z-index:1;
        }

        .cta-n {
            font-family:'IBM Plex Mono',monospace;
            font-size:11.5px; opacity:.6; font-weight:500;
        }

        .cta.firing {
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            box-shadow:
                0 0 0 1px rgba(139,92,246,.2),
                0 4px 16px rgba(139,92,246,.15);
            pointer-events: none;
        }

        /* ════════════════════ PROGRESS ════════════════════ */
        .prog {
            margin-top:8px;
            overflow:hidden;
            max-height:0; opacity:0;
            transition: all .5s cubic-bezier(.16,1,.3,1);
        }

        .prog.show { max-height:600px; opacity:1; }

        .prog-in {
            background: var(--glass);
            border: 1px solid var(--glass-b);
            border-radius: 14px;
            padding: 18px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .prog-top {
            display:flex; justify-content:space-between; align-items:flex-start;
        }

        .prog-left {}

        .prog-ev {
            font-size: 12.5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .prog-dot {
            width:5px; height:5px; border-radius:50%;
            background:var(--red);
            animation: blink .4s ease infinite alternate;
        }

        .prog-dot.ok { background:var(--green); animation:none; }

        .prog-hint {
            font-family:'IBM Plex Mono',monospace;
            font-size:10.5px;
            color:var(--text-3);
            margin-top:3px;
        }

        .prog-right { text-align:right; }

        .prog-num {
            font-family:'IBM Plex Mono',monospace;
            font-size:28px; font-weight:700;
            letter-spacing:-2px; line-height:1;
            color:var(--text);
            transition: color .4s;
        }

        .prog-num.ok { color:var(--green); }

        .prog-of {
            font-size:12px; color:var(--text-3);
            font-weight:400; letter-spacing:0;
        }

        /* Track */
        .trk {
            height:3px;
            background:rgba(255,255,255,.04);
            border-radius:3px;
            overflow:hidden;
            margin-top:14px;
        }

        .trk-fill {
            height:100%; width:0%;
            border-radius:3px;
            background: linear-gradient(90deg, var(--red), var(--violet), var(--cyan));
            background-size: 200% 100%;
            animation: gradSlide 2s linear infinite;
            transition: width .15s ease-out;
        }

        .trk-fill.ok {
            background: var(--green);
            animation: none;
            transition: width .15s ease-out, background .4s;
        }

        /* Ticker */
        .ticks {
            margin-top:14px;
            display:flex; flex-wrap:wrap; gap:3px;
        }

        .t {
            font-family:'IBM Plex Mono',monospace;
            font-size:9px; font-weight:500;
            padding:3.5px 6px;
            border-radius:4px;
            background:rgba(255,255,255,.02);
            border:1px solid rgba(255,255,255,.035);
            color:var(--text-3);
            transition: all .3s cubic-bezier(.16,1,.3,1);
        }

        .t.ok {
            background:var(--green-g);
            border-color:rgba(34,197,94,.15);
            color:var(--green);
            animation: pop .35s cubic-bezier(.16,1,.3,1);
        }

        /* Duration bar */
        .dur {
            font-family:'IBM Plex Mono',monospace;
            font-size:10px;
            color:var(--text-3);
            margin-top:12px;
            display:flex;
            align-items:center;
            gap:6px;
            opacity:0;
            transition: opacity .3s;
        }

        .dur.show { opacity:1; }

        .dur-icon { font-size:11px; }

        /* Success */
        .ok-banner {
            margin-top:16px;
            padding:16px;
            background: linear-gradient(135deg, rgba(34,197,94,.07), rgba(34,197,94,.025));
            border:1px solid rgba(34,197,94,.1);
            border-radius:12px;
            display:flex; align-items:center; gap:12px;
            opacity:0;
            transform:translateY(8px) scale(.97);
            transition: all .5s cubic-bezier(.16,1,.3,1);
        }

        .ok-banner.show { opacity:1; transform:translateY(0) scale(1); }

        .ok-ring {
            width:36px; height:36px;
            border-radius:50%;
            background:var(--green);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
            box-shadow: 0 0 16px rgba(34,197,94,.2);
        }

        .ok-ring svg { width:16px; height:16px; stroke:#fff; stroke-width:2.5; fill:none; }

        .ok-body { flex:1; }
        .ok-t { font-size:14px; font-weight:600; color:var(--green); }

        .ok-s {
            font-family:'IBM Plex Mono',monospace;
            font-size:10.5px;
            color:rgba(34,197,94,.45);
            margin-top:2px;
        }

        /* ════════════════════ TOAST ════════════════════ */
        .toast {
            position:fixed;
            bottom:24px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            padding:8px 14px;
            border-radius:8px;
            font-size:12px;
            font-weight:500;
            color:var(--text);
            opacity:0;
            z-index:200;
            pointer-events:none;
            transition: all .3s cubic-bezier(.16,1,.3,1);
        }

        .toast.show {
            opacity:1;
            transform:translateX(-50%) translateY(0);
        }

        /* ════════════════════ SOUND ════════════════════ */
        .snd {
            position:fixed; top:14px; right:14px; z-index:50;
            width:32px; height:32px; border-radius:8px;
            background:var(--glass);
            border:1px solid var(--glass-b);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all .2s;
            opacity:0; animation: up .4s ease .8s forwards;
        }

        .snd:hover { background:rgba(255,255,255,.06); border-color:var(--glass-bh); }
        .snd svg { width:14px; height:14px; stroke:var(--text-2); stroke-width:2; fill:none; }
        .snd.off svg { stroke:var(--text-3); }

        /* ════════════════════ FOOTER ════════════════════ */
        .foot {
            text-align:center;
            margin-top:24px;
            font-size:10.5px;
            color:var(--text-3);
            opacity:0;
            animation: up .5s ease .55s forwards;
        }

        .foot a {
            color:var(--cyan);
            text-decoration:none;
            border-bottom:1px solid rgba(37,244,238,.12);
            transition:border-color .2s;
        }

        .foot a:hover { border-color:var(--cyan); }

        .foot kbd {
            display:inline-block;
            padding:1px 5px;
            border:1px solid var(--glass-b);
            border-radius:3px;
            font-family:'IBM Plex Mono',monospace;
            font-size:9px;
            color:var(--text-3);
            margin: 0 1px;
            background:rgba(255,255,255,.02);
        }

        .hotkeys {
            margin-top:8px;
            opacity:.5;
        }

        /* ════════════════════ KEYFRAMES ════════════════════ */
        @keyframes up {
            from { opacity:0; transform:translateY(12px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
        @keyframes orbDrift {
            0%,100% { opacity:.1; transform:translate(-50%,-50%) scale(1); }
            50% { opacity:.18; transform:translate(-50%,-50%) scale(1.12); }
        }
        @keyframes pulse {
            0%,100% { box-shadow:0 0 6px var(--green),0 0 16px rgba(34,197,94,.2); }
            50% { box-shadow:0 0 10px var(--green),0 0 24px rgba(34,197,94,.12); }
        }
        @keyframes blink { from{opacity:.35} to{opacity:1} }
        @keyframes pop {
            0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1}
        }
        @keyframes rip { to{transform:scale(4);opacity:0} }
        @keyframes shock {
            0%{opacity:.6;transform:scale(1)}
            100%{opacity:0;transform:scale(1.6)}
        }
        @keyframes gradSlide {
            0% { background-position:0% 0; }
            100% { background-position:200% 0; }
        }
        @keyframes checkDraw {
            from{stroke-dashoffset:24} to{stroke-dashoffset:0}
        }

        @media(max-width:400px) {
            .brand h1 { font-size:20px; }
            .cta { padding:14px; font-size:13.5px; }
            .prog-num { font-size:24px; }
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div class="toast" id="toast"></div>

<div class="snd" id="snd" onclick="toggleSnd()" title="Sonido on/off">
    <svg id="sndSvg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 010 7.07"/>

<script>
// ═══════════════ STATE ═══════════════
let on = false, info = {name:'',id:''}, busy = false, sndOn = true;
let bgMode = 'idle'; // idle | on | fire | done
let audioCtx = null;
let fireStart = 0;

const EV = [
    'ViewContent','ClickButton','Search','AddToWishlist',
    'AddToCart','InitiateCheckout','AddPaymentInfo','PlaceAnOrder',
    'CompletePayment','Subscribe','Contact','SubmitForm',
    'Download','CompleteRegistration'
];

const PARAMS = {
    value: 0, currency: 'USD', content_id: 'test', content_type: 'product',
    email: 'test@example.com', phone: '+1234567890'
};

// ═══════════════ AUDIO ═══════════════
// Pentatonic scale: C D E G A (across 2 octaves)
const SCALE = [523.25,587.33,659.25,783.99,880,1046.5,1174.66,1318.51];

function initAudio() { if(!audioCtx) audioCtx = new (AudioContext||webkitAudioContext)(); }

function sndTick(i, total) {
    if(!sndOn||!audioCtx) return;
    const idx = Math.floor((i/total) * (SCALE.length-1));
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = SCALE[idx];
    o.type = 'sine';
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(.05, t);
    g.gain.exponentialRampToValueAtTime(.001, t+.1);
    o.start(t); o.stop(t+.1);
}

function sndOk() {
    if(!sndOn||!audioCtx) return;
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value=f; o.type='sine';
        const t=audioCtx.currentTime+i*.09;
        g.gain.setValueAtTime(.06,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.4);
        o.start(t); o.stop(t+.4);
    });
}

function sndConnect() {
    if(!sndOn||!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(280,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(560,audioCtx.currentTime+.12);
    o.type='sine';
    g.gain.setValueAtTime(.05,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.18);
    o.start(); o.stop(audioCtx.currentTime+.18);
}

function toggleSnd() {
    sndOn=!sndOn;
    const el=document.getElementById('snd');
    el.classList.toggle('off',!sndOn);
    document.getElementById('sndSvg').innerHTML = sndOn
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
}

// ═══════════════ CANVAS BG ═══════════════
;(function(){
    const c=document.getElementById('bg'), x=c.getContext('2d');
    let w,h, pts=[];
    function rs(){w=c.width=innerWidth;h=c.height=innerHeight;}
    addEventListener('resize',rs); rs();

    for(let i=0;i<45;i++) pts.push({
        x:Math.random()*w, y:Math.random()*h,
        r:Math.random()*1.5+.3,
        vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2,
        hue:Math.random()
    });

    function col(hue){
        if(bgMode==='fire') return hue<.33?'rgba(254,44,85,.1)':hue<.66?'rgba(139,92,246,.08)':'rgba(37,244,238,.08)';
        if(bgMode==='done') return 'rgba(34,197,94,.06)';
        return hue<.33?'rgba(254,44,85,.045)':hue<.66?'rgba(37,244,238,.035)':'rgba(139,92,246,.03)';
    }

    function draw(){
        x.clearRect(0,0,w,h);
        const sp = bgMode==='fire'?2.2:1;

        // Mesh gradient
        [[.15,.22,w*.32,'rgba(254,44,85,'+(bgMode==='done'?'.008':'.015')+')'],[.82,.72,w*.28,'rgba(37,244,238,'+(bgMode==='done'?'.006':'.012')+')'],[.5,.5,w*.4,'rgba(139,92,246,.008)']].forEach(([px,py,r,c1])=>{
            const g=x.createRadialGradient(w*px,h*py,0,w*px,h*py,r);
            g.addColorStop(0,bgMode==='done'?'rgba(34,197,94,.018)':c1);
            g.addColorStop(1,'transparent');
            x.fillStyle=g; x.fillRect(0,0,w,h);
        });

        pts.forEach(p=>{
            p.x+=p.vx*sp; p.y+=p.vy*sp;
            if(p.x<-5)p.x=w+5; if(p.x>w+5)p.x=-5;
            if(p.y<-5)p.y=h+5; if(p.y>h+5)p.y=-5;
            x.beginPath();
            x.arc(p.x,p.y,p.r*(bgMode==='fire'?1.3:1),0,Math.PI*2);
            x.fillStyle=col(p.hue);
            x.fill();
        });

        requestAnimationFrame(draw);
    }
    draw();
})();

// ═══════════════ CONFETTI ═══════════════
function boom(){
    const c=document.getElementById('fx'), x=c.getContext('2d');
    c.width=innerWidth; c.height=innerHeight;
    const rect=document.getElementById('cta').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top;
    const ps=[], cls=['#fe2c55','#25f4ee','#22c55e','#8b5cf6','#f59e0b','#ec4899','#fff'];

    for(let i=0;i<90;i++){
        const a=Math.random()*Math.PI*2, v=5+Math.random()*9;
        ps.push({
            x:cx,y:cy,
            w:2+Math.random()*5, h:1.5+Math.random()*2.5,
            dx:Math.cos(a)*v, dy:Math.sin(a)*v-5,
            rot:Math.random()*360, dr:(Math.random()-.5)*13,
            c:cls[~~(Math.random()*cls.length)],
            g:.3+Math.random()*.18, op:1, d:Math.random()*3
        });
    }

    let f=0;
    function draw(){
        x.clearRect(0,0,c.width,c.height);
        let alive=false;
        ps.forEach(p=>{
            if(f<p.d||p.op<=0)return;
            alive=true;
            p.x+=p.dx; p.dy+=p.g; p.y+=p.dy;
            p.dx*=.986; p.rot+=p.dr;
            if(f>28) p.op-=.02;
            x.save();
            x.translate(p.x,p.y);
            x.rotate(p.rot*Math.PI/180);
            x.globalAlpha=Math.max(0,p.op);
            x.fillStyle=p.c;
            x.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            x.restore();
        });
        f++;
        alive?requestAnimationFrame(draw):x.clearRect(0,0,c.width,c.height);
    }
    draw();
}

// ═══════════════ RIPPLE ═══════════════
document.querySelectorAll('.btn').forEach(b=>{
    b.addEventListener('click',function(e){
        const r=document.createElement('span'); r.className='rip';
        const d=Math.max(this.offsetWidth,this.offsetHeight);
        r.style.width=r.style.height=d+'px';
        const rc=this.getBoundingClientRect();
        r.style.left=(e.clientX-rc.left-d/2)+'px';
        r.style.top=(e.clientY-rc.top-d/2)+'px';
        this.appendChild(r);
        r.onanimationend=()=>r.remove();
    });
});

// ═══════════════ TOAST ═══════════════
let toastTimer;
function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

// ═══════════════ COPY ID ═══════════════
function copyId(){
    if(!info.id) return;
    navigator.clipboard.writeText(info.id).then(()=>toast('ID copiado')).catch(()=>{});
}

// ═══════════════ INIT ═══════════════
document.getElementById('ticks').innerHTML = EV.map(e=>`<div class="t" data-e="${e}">${e}</div>`).join('');

const saved=localStorage.getItem('ttPixelId');
if(saved) document.getElementById('inp').value=saved;

// Show last fire time
function showLastFire(){
    const ts=localStorage.getItem('ttLastFire'); // extra: last activation time
    const el=document.getElementById('lastFire');
    if(ts && on){
        const d=new Date(parseInt(ts));
        el.textContent='Última activación: '+d.toLocaleDateString('es',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
        el.classList.add('show');
    } else {
        el.classList.remove('show');
    }
}

// Validation
function validate(v){
    const hint=document.getElementById('hint');
    const hintTxt=document.getElementById('hintTxt');
    const inp=document.getElementById('inp');

    if(!v){ hint.classList.remove('show','err'); inp.classList.remove('err'); return false; }
    // TikTok pixel IDs are typically alphanumeric, starting with C, ~20 chars
    if(v.length<5){
        hint.classList.add('show','err'); hintTxt.textContent='ID demasiado corto';
        inp.classList.add('err'); return false;
    }
    hint.classList.remove('err'); inp.classList.remove('err');
    hint.classList.add('show'); hintTxt.textContent='Listo para conectar';
    return true;
}

document.getElementById('inp').addEventListener('input', e=>validate(e.target.value.trim()));

// Keyboard
document.getElementById('inp').addEventListener('keydown', e=>{
    if(e.key==='Enter') doConnect();
});

document.addEventListener('keydown', e=>{
    if(e.code==='Space' && document.activeElement!==document.getElementById('inp')){
        e.preventDefault();
        doFire();
    }
});

// ═══════════════ STATUS ═══════════════
function setSts(name,id,tag,live){
    document.getElementById('stsName').textContent=name;
    document.getElementById('stsIdTxt').textContent=id||'—';
    document.getElementById('stsTag').textContent=tag;
    document.getElementById('stsOrb').classList.toggle('on',live);
    document.getElementById('stsTag').classList.toggle('on',live);
    document.getElementById('stsCard').classList.toggle('live',live);
    document.getElementById('logoBox').classList.toggle('glow',live);
    document.getElementById('copyBtn').style.display=live?'inline':'none';
}

// ═══════════════ CONNECT ═══════════════
async function doConnect(){
    initAudio();
    const pid=document.getElementById('inp').value.trim();
    if(!pid||!validate(pid)) return;

    const btn=document.getElementById('conBtn');
    btn.classList.add('ld'); btn.disabled=true;
    setSts('Conectando…',pid,'checking',false);
    document.getElementById('hint').classList.remove('show');

    try {
        var oldScript = document.getElementById('ttPixelScript');
        if (oldScript) oldScript.remove();
        document.querySelectorAll('script[src*="analytics.tiktok.com"]').forEach(function(s){ s.remove(); });
        if (window.ttq) { try { delete window.ttq; } catch(e) { window.ttq = undefined; } }

        const px=await getPxInfo(pid);

        !function(w,d,t){
            w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"];ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=i;ttq._t=ttq._t||{};ttq._t[e]=+new Date;ttq._o=ttq._o||{};ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript";o.async=!0;o.id="ttPixelScript";o.src=i+"?sdkid="+e+"&lib="+t;var a=d.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a);};ttq.load(pid);ttq.page();
        }(window,document,'ttq');

        on=true; bgMode='on';
        info={name:px.name,id:pid};
        setSts(px.name,pid,'connected',true);
        localStorage.setItem('ttPixelId',pid);
        document.getElementById('cta').disabled=false;
        sndConnect();
        resetProg();
        showLastFire();

        // Shockwave
        const sk=document.getElementById('shock');
        sk.classList.remove('fire');
        void sk.offsetWidth;
        sk.classList.add('fire');

        toast('Pixel conectado');

    } catch(err) {
        setSts('Error de conexión',pid,'error',false);
        on=false;
        const hint=document.getElementById('hint');
        const hintTxt=document.getElementById('hintTxt');
        hint.classList.add('show','err');
        hintTxt.textContent='No se pudo verificar el pixel';
        document.getElementById('inp').classList.add('err');
    }

    btn.classList.remove('ld'); btn.disabled=false;
}

function getPxInfo(pixelId){
    return fetch('https://analytics.tiktok.com/i18n/pixel/config.js?sdkid='+encodeURIComponent(pixelId)+'&verifyDomain=true&lib=ttq&t='+Date.now())
        .then(function(r){ return r.ok ? r.text() : Promise.reject(new Error('Not found')); })
        .then(function(text){
            var name=null;
            var m=text.match(/"pixel_name"\s*:\s*"([^"]+)"/); if(m) name=m[1];
            if(!name){ m=text.match(/"display_name"\s*:\s*"([^"]+)"/); if(m) name=m[1]; }
            if(!name){ m=text.match(/"advertiser_name"\s*:\s*"([^"]+)"/); if(m) name=m[1]; }
            if(!name){ m=text.match(/"name"\s*:\s*"([^"]+)"/); if(m) name=m[1]; }
            if(text.indexOf(pixelId)!==-1||text.length>200){
                return { name: name||'Pixel '+pixelId.substring(0,8), id: pixelId };
            }
            return Promise.reject(new Error('Invalid'));
        })
        .catch(function(){
            return new Promise(function(resolve){
                var script=document.createElement('script');
                script.src='https://analytics.tiktok.com/i18n/pixel/events.js?sdkid='+encodeURIComponent(pixelId)+'&lib=ttq&t='+Date.now();
                var t=setTimeout(function(){ script.remove(); resolve({ name: 'Pixel '+pixelId.substring(0,8), id: pixelId }); }, 3000);
                script.onload=function(){ clearTimeout(t); script.remove(); resolve({ name: 'Pixel '+pixelId.substring(0,8), id: pixelId }); };
                script.onerror=function(){ clearTimeout(t); script.remove(); resolve({ name: 'Pixel '+pixelId.substring(0,8), id: pixelId }); };
                document.head.appendChild(script);
            });
        });
}

// ═══════════════ FIRE ═══════════════
function doFire(){
    if(!on||busy) return;
    initAudio();
    busy=true;
    bgMode='fire';
    fireStart=performance.now();

    const prog=document.getElementById('prog');
    const fill=document.getElementById('trkFill');
    const banner=document.getElementById('okBanner');
    const ring=document.getElementById('ring');
    const ringFil=document.getElementById('ringFil');
    const cta=document.getElementById('cta');

    prog.classList.add('show');
    banner.classList.remove('show');
    fill.classList.remove('ok');
    fill.style.width='0%';
    cta.disabled=true;
    cta.classList.add('firing');
    document.getElementById('ctaLabel').textContent='Disparando…';
    document.getElementById('progDot').classList.remove('ok');
    document.getElementById('progHint').textContent='Disparando eventos…';
    document.getElementById('progNum').classList.remove('ok');
    document.getElementById('dur').classList.remove('show');
    document.querySelectorAll('.t').forEach(t=>t.classList.remove('ok'));

    // Ring
    ring.classList.add('on');
    const circ=2*Math.PI*35;
    ringFil.style.strokeDasharray=circ;
    ringFil.style.strokeDashoffset=circ;

    // Re-draw checkmark
    document.getElementById('checkMark').style.animation='none';
    document.getElementById('checkMark').style.strokeDashoffset='24';

    let done=0;

    EV.forEach((ev,i)=>{
        setTimeout(()=>{
            try{ttq.track(ev,PARAMS)}catch(e){}
            done++;
            sndTick(i,EV.length);

            const pct=(done/EV.length)*100;
            fill.style.width=pct+'%';
            ringFil.style.strokeDashoffset=circ-(circ*done/EV.length);
            document.getElementById('progLabel').textContent=ev;
            document.getElementById('progNum').innerHTML=done+'<span class="prog-of"> / '+EV.length+'</span>';

            const tk=document.querySelector(`.t[data-e="${ev}"]`);
            if(tk) tk.classList.add('ok');

            if(done===EV.length){
                const elapsed=((performance.now()-fireStart)/1000).toFixed(1);
                setTimeout(()=>{
                    fill.classList.add('ok');
                    bgMode='done';
                    document.getElementById('progDot').classList.add('ok');
                    document.getElementById('progLabel').textContent='Completado';
                    document.getElementById('progHint').textContent=`Enviados a ${info.name}`;
                    document.getElementById('progNum').classList.add('ok');

                    // Duration
                    document.getElementById('durTxt').textContent=`${EV.length} eventos en ${elapsed}s`;
                    document.getElementById('dur').classList.add('show');

                    // Banner
                    banner.classList.add('show');
                    document.getElementById('okTitle').textContent=EV.length+' eventos activados';
                    document.getElementById('okSub').textContent=info.name+' · '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

                    // Checkmark animation
                    const cm=document.getElementById('checkMark');
                    cm.style.animation='checkDraw .4s ease .15s forwards';

                    // Store last fire
                    localStorage.setItem('ttLastFire', Date.now().toString());
                    showLastFire();

                    busy=false;
                    cta.disabled=false;
                    cta.classList.remove('firing');
                    document.getElementById('ctaLabel').textContent='Activar Eventos';

                    sndOk();
                    boom();

                    setTimeout(()=>ring.classList.remove('on'),2500);
                },300);
            }
        },i*110);
    });
}

function resetProg(){
    document.getElementById('prog').classList.remove('show');
    document.getElementById('okBanner').classList.remove('show');
    document.getElementById('trkFill').style.width='0%';
    document.getElementById('trkFill').classList.remove('ok');
    document.getElementById('progDot').classList.remove('ok');
    document.getElementById('progNum').classList.remove('ok');
    document.getElementById('ring').classList.remove('on');
    document.getElementById('dur').classList.remove('show');
    document.querySelectorAll('.t').forEach(t=>t.classList.remove('ok'));
    bgMode=on?'on':'idle';
}

// Init
document.getElementById('copyBtn').style.display='none';
showLastFire();
</script>
