<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito | Holistic Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; line-height: 1.6; background: #f4f5f7; color: #1a1d26; -webkit-font-smoothing: antialiased; min-height: 100vh; }
        .hero {
            background: linear-gradient(135deg, #1b2559 0%, #0d1842 100%);
            color: #fff;
            padding: 60px 24px 80px;
            text-align: center;
        }
        .hero-inner { max-width: 640px; margin: 0 auto; }
        .hero h1 { font-size: clamp(32px, 5vw, 44px); font-weight: 800; letter-spacing: -0.5px; margin-bottom: 16px; }
        .hero p { font-size: 18px; opacity: 0.9; line-height: 1.6; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 14px 28px;
            background: #fff;
            color: #1b2559;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        .content-box {
            background: #fff;
            border: 1px solid #e2e4e9;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            color: #5f6577;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-inner">
            <h1>Crédito</h1>
            <p>Soluciones de crédito para impulsar tu negocio con Holistic Marketing.</p>
            <a href="/" class="btn">Volver al inicio</a>
        </div>
    </div>
    <div class="content">
        <div class="content-box">Próximamente más información sobre opciones de crédito.</div>
    </div>
</body>
</html>
