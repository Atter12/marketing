<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Plus Jakarta Sans", sans-serif; line-height: 1.6; background: #f8f9fa; }
        
        .location-offer-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(0,0,0,0.7); 
            z-index: 10000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .location-offer-card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            max-width: 500px; 
            width: 100%; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            text-align: center; 
            position: relative; 
            animation: slideIn 0.3s ease-out; 
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .location-offer-icon { 
            width: 80px; 
            height: 80px; 
            margin: 0 auto 24px; 
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 36px; 
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); 
        }
        .location-offer-title { 
            font-size: 24px; 
            font-weight: 800; 
            color: #1f2937; 
            margin-bottom: 12px; 
            line-height: 1.4; 
        }
        .location-highlight { 
            color: #dc2626; 
            position: relative; 
            display: inline-block; 
        }
        .blinking-cursor { 
            color: #6b7280; 
            animation: blink 1s infinite; 
            margin-left: 2px; 
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .location-offer-subtitle { 
            font-size: 15px; 
            color: #6b7280; 
            margin-bottom: 24px; 
            line-height: 1.6; 
        }
        .location-offer-timer { 
            background: #f8f9fa; 
            padding: 16px 24px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            font-weight: 700; 
            color: #1f2937; 
            font-size: 16px; 
        }
        .location-offer-cta { 
            width: 100%; 
            padding: 18px 32px; 
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); 
        }
        .location-offer-cta:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.4); 
        }
        .location-offer-cta i { 
            font-size: 18px; 
        }
        @media (max-width: 768px) {
            .location-offer-overlay { padding: 15px; }
            .location-offer-card { padding: 30px 20px; max-width: 100%; }
            .location-offer-icon { width: 60px; height: 60px; font-size: 28px; margin-bottom: 20px; }
            .location-offer-title { font-size: 20px; line-height: 1.3; }
            .location-offer-subtitle { font-size: 14px; margin-bottom: 20px; }
            .location-offer-timer { padding: 12px 20px; font-size: 14px; margin-bottom: 20px; }
            .location-offer-cta { padding: 16px 24px; font-size: 14px; gap: 8px; }
            .location-offer-cta i { font-size: 16px; }
        }
        @media (max-width: 480px) {
            .location-offer-card { padding: 25px 15px; }
            .location-offer-title { font-size: 18px; }
            .location-offer-cta { padding: 14px 20px; font-size: 13px; letter-spacing: 0.5px; }
        }
    </style>
</head>
<body>
    <div id="locationOfferOverlay" class="location-offer-overlay" style="display: none;">
        <div class="location-offer-card">
            <div class="location-offer-icon">
                <i class="fas fa-gift"></i>
            </div>
            <h2 class="location-offer-title">
                ¡Espera! Oferta especial para 
                <span class="location-highlight" id="detectedLocation">Lima</span>
                <span class="blinking-cursor">|</span>
            </h2>
            <p class="location-offer-subtitle">¡Aprovecha un descuento exclusivo solo por hoy para los habitantes de tu zona!</p>
            <div class="location-offer-timer">
                <span>⏰ ¡Tiempo terminado!</span>
            </div>
            <button class="location-offer-cta" id="locationOfferCTA">
                <i class="fas fa-hand-point-right"></i>
                CLICK AQUÍ PARA CONTINUAR
                <i class="fas fa-hand-point-left"></i>
            </button>
        </div>
    </div>

    <script>
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const destinationUrl = urlParams.get('url') || '';
        const waitSeconds = parseInt(urlParams.get('wait')) || 5;
        
        // Obtener parámetros personalizados del editor
        const popupTitle = urlParams.get('title') || '¡Espera! Oferta especial para';
        const popupSubtitle = urlParams.get('subtitle') || '¡Aprovecha un descuento exclusivo solo por hoy para los habitantes de tu zona!';
        const popupButtonText = urlParams.get('button') || 'CLICK AQUÍ PARA CONTINUAR';
        const popupGradientStart = urlParams.get('gradientStart') || '#8b5cf6';
        const popupGradientEnd = urlParams.get('gradientEnd') || '#ec4899';
        const popupLocationColor = urlParams.get('locationColor') || '#dc2626';
        const popupDefaultLocation = urlParams.get('defaultLocation') || 'Lima';
        
        if (!destinationUrl) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;"><h1>Error</h1><p>URL de destino no especificada</p></div>';
        } else {
            // Aplicar personalizaciones al popup
            function applyCustomizations() {
                // Actualizar título
                const titleElement = document.querySelector('.location-offer-title');
                if (titleElement) {
                    const locationSpan = titleElement.querySelector('.location-highlight');
                    if (locationSpan) {
                        titleElement.innerHTML = escapeHtml(popupTitle) + ' <span class="location-highlight" id="detectedLocation" style="color: ' + escapeHtml(popupLocationColor) + ';">' + escapeHtml(popupDefaultLocation) + '</span><span class="blinking-cursor">|</span>';
                    }
                }
                
                // Actualizar subtítulo
                const subtitleElement = document.querySelector('.location-offer-subtitle');
                if (subtitleElement) {
                    subtitleElement.textContent = popupSubtitle;
                }
                
                // Actualizar botón
                const buttonElement = document.getElementById('locationOfferCTA');
                if (buttonElement) {
                    buttonElement.innerHTML = '<i class="fas fa-hand-point-right"></i>' + escapeHtml(popupButtonText) + '<i class="fas fa-hand-point-left"></i>';
                    buttonElement.style.background = 'linear-gradient(135deg, ' + escapeHtml(popupGradientStart) + ' 0%, ' + escapeHtml(popupGradientEnd) + ' 100%)';
                }
                
                // Actualizar icono
                const iconElement = document.querySelector('.location-offer-icon');
                if (iconElement) {
                    iconElement.style.background = 'linear-gradient(135deg, ' + escapeHtml(popupGradientStart) + ' 0%, ' + escapeHtml(popupGradientEnd) + ' 100%)';
                }
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // Aplicar personalizaciones inmediatamente
            applyCustomizations();
            
            // Geolocalización automática
            var detectedLocation = popupDefaultLocation;
            var locationOfferOverlay = document.getElementById("locationOfferOverlay");
            var locationElement = document.getElementById("detectedLocation");
            
            // Sistema de logging para debug
            function debugLog(message, data) {
                console.log('[Landing] ' + message, data || '');
            }
            
            // Función helper para actualizar ubicación manteniendo el color
            function updateLocationText(location) {
                if (locationElement) {
                    locationElement.textContent = location;
                    locationElement.style.color = popupLocationColor;
                }
            }
            
            // Intentar detectar ubicación automáticamente con múltiples estrategias
            function detectLocation() {
                debugLog('Iniciando detección de ubicación...');
                
                // Estrategia 1: API basada en IP (más confiable, funciona siempre)
                useIPLocation();
                
                // Estrategia 2: Intentar geolocalización del navegador (solo si no está bloqueada)
                if (navigator.geolocation) {
                    try {
                        debugLog('Intentando geolocalización del navegador...');
                        navigator.geolocation.getCurrentPosition(
                            function(position) {
                                debugLog('Geolocalización exitosa:', { lat: position.coords.latitude, lng: position.coords.longitude });
                                fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" + position.coords.latitude + "&longitude=" + position.coords.longitude + "&localityLanguage=es")
                                    .then(response => response.json())
                                    .then(data => {
                                        debugLog('Datos de geocodificación:', data);
                                        if (data.city) {
                                            detectedLocation = data.city;
                                            updateLocationText(detectedLocation);
                                            debugLog('Ubicación actualizada desde GPS:', detectedLocation);
                                        } else if (data.principalSubdivision) {
                                            detectedLocation = data.principalSubdivision;
                                            updateLocationText(detectedLocation);
                                            debugLog('Ubicación actualizada desde GPS (región):', detectedLocation);
                                        }
                                    })
                                    .catch(function(error) { 
                                        debugLog('Error en geocodificación GPS:', error);
                                    });
                            },
                            function(error) {
                                debugLog('Error de geolocalización:', { code: error.code, message: error.message });
                                // Ya se está usando IP location, no hacer nada
                            },
                            { timeout: 5000, enableHighAccuracy: false }
                        );
                    } catch (e) {
                        debugLog('Excepción en geolocalización:', e);
                    }
                } else {
                    debugLog('Geolocalización no disponible en este navegador');
                }
            }
            
            // Función usando múltiples APIs basadas en IP (fallback)
            function useIPLocation() {
                debugLog('Usando API basada en IP...');
                
                // Intentar múltiples APIs en paralelo
                const apis = [
                    { url: 'https://ipapi.co/json/', name: 'ipapi.co' },
                    { url: 'https://ip-api.com/json/?lang=es', name: 'ip-api.com' },
                    { url: 'https://api.ipify.org?format=json', name: 'ipify' }
                ];
                
                // Intentar primera API
                fetch(apis[0].url)
                    .then(response => {
                        if (!response.ok) throw new Error('Response not ok');
                        return response.json();
                    })
                    .then(data => {
                        debugLog('Datos de ' + apis[0].name + ':', data);
                        if (data.city) {
                            detectedLocation = data.city;
                            updateLocationText(detectedLocation);
                            debugLog('Ubicación actualizada desde IP:', detectedLocation);
                        } else if (data.region) {
                            detectedLocation = data.region;
                            updateLocationText(detectedLocation);
                            debugLog('Ubicación actualizada desde IP (región):', detectedLocation);
                        } else if (data.query) {
                            // ip-api.com usa 'query' para la IP
                            trySecondAPI();
                        }
                    })
                    .catch(function(error) {
                        debugLog('Error con ' + apis[0].name + ':', error);
                        trySecondAPI();
                    });
                
                function trySecondAPI() {
                    fetch(apis[1].url)
                        .then(response => {
                            if (!response.ok) throw new Error('Response not ok');
                            return response.json();
                        })
                        .then(data => {
                            debugLog('Datos de ' + apis[1].name + ':', data);
                            if (data.city) {
                                detectedLocation = data.city;
                                updateLocationText(detectedLocation);
                                debugLog('Ubicación actualizada desde IP (API 2):', detectedLocation);
                            } else if (data.regionName) {
                                detectedLocation = data.regionName;
                                updateLocationText(detectedLocation);
                                debugLog('Ubicación actualizada desde IP (región API 2):', detectedLocation);
                            }
                        })
                        .catch(function(error) {
                            debugLog('Error con ' + apis[1].name + ':', error);
                            debugLog('Usando ubicación por defecto: Lima');
                        });
                }
            }
            
            // Ejecutar detección de ubicación
            detectLocation();
            
            // Función helper para redirección segura (maneja CSP e iframes sandboxed)
            function safeRedirect(url) {
                debugLog('Iniciando redirección a:', url);
                
                // Estrategia 1: Redirección directa (más común)
                try {
                    debugLog('Estrategia 1: Intentando window.location.href');
                    window.location.href = url;
                    return;
                } catch (e) {
                    debugLog('Estrategia 1 falló:', e);
                }
                
                // Estrategia 2: window.location.replace (no deja historial)
                try {
                    debugLog('Estrategia 2: Intentando window.location.replace');
                    window.location.replace(url);
                    return;
                } catch (e2) {
                    debugLog('Estrategia 2 falló:', e2);
                }
                
                // Estrategia 3: window.location.assign
                try {
                    debugLog('Estrategia 3: Intentando window.location.assign');
                    window.location.assign(url);
                    return;
                } catch (e3) {
                    debugLog('Estrategia 3 falló:', e3);
                }
                
                // Estrategia 4: window.open en nueva ventana
                try {
                    debugLog('Estrategia 4: Intentando window.open');
                    var newWindow = window.open(url, "_blank", "noopener,noreferrer");
                    if (newWindow) {
                        debugLog('Redirección exitosa con window.open');
                        return;
                    }
                } catch (e4) {
                    debugLog('Estrategia 4 falló:', e4);
                }
                
                // Estrategia 5: Crear link y hacer click programático
                try {
                    debugLog('Estrategia 5: Intentando crear link y hacer click');
                    var link = document.createElement("a");
                    link.href = url;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.style.display = "none";
                    document.body.appendChild(link);
                    
                    // Intentar click
                    if (link.click) {
                        link.click();
                        debugLog('Click en link ejecutado');
                    } else {
                        // Fallback para navegadores antiguos
                        var event = new MouseEvent('click', {
                            view: window,
                            bubbles: true,
                            cancelable: true
                        });
                        link.dispatchEvent(event);
                        debugLog('Evento click disparado');
                    }
                    
                    setTimeout(function() {
                        document.body.removeChild(link);
                    }, 100);
                    return;
                } catch (e5) {
                    debugLog('Estrategia 5 falló:', e5);
                }
                
                // Estrategia 6: Usar form submit
                try {
                    debugLog('Estrategia 6: Intentando form submit');
                    var form = document.createElement("form");
                    form.method = "GET";
                    form.action = url;
                    form.target = "_blank";
                    document.body.appendChild(form);
                    form.submit();
                    setTimeout(function() {
                        document.body.removeChild(form);
                    }, 100);
                    debugLog('Form submit ejecutado');
                    return;
                } catch (e6) {
                    debugLog('Estrategia 6 falló:', e6);
                }
                
                // Último recurso: Mostrar mensaje al usuario
                debugLog('Todas las estrategias fallaron, mostrando mensaje al usuario');
                alert('Por favor, haz clic en el siguiente enlace para continuar:\n\n' + url);
                
                // Intentar una vez más con location después del alert
                setTimeout(function() {
                    try {
                        window.location.href = url;
                    } catch (finalError) {
                        debugLog('Redirección final falló:', finalError);
                    }
                }, 100);
            }
            
            // Mostrar popup automáticamente
            if (locationOfferOverlay) {
                locationOfferOverlay.style.display = "flex";
                
                // Botón CTA del popup
                var locationOfferCTA = document.getElementById("locationOfferCTA");
                if (locationOfferCTA) {
                    locationOfferCTA.addEventListener("click", function() {
                        safeRedirect(destinationUrl);
                    });
                }
            }
            
            // Actualizar timer en el popup
            var timerElement = document.querySelector(".location-offer-timer span");
            if (timerElement && waitSeconds > 0) {
                var countdown = waitSeconds;
                var interval = setInterval(function() {
                    countdown--;
                    if (timerElement) {
                        if (countdown > 0) {
                            timerElement.textContent = "⏰ Redirigiendo en " + countdown + " segundo" + (countdown !== 1 ? "s" : "") + "...";
                        } else {
                            timerElement.textContent = "⏰ ¡Tiempo terminado!";
                        }
                    }
                    if (countdown <= 0) {
                        clearInterval(interval);
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
