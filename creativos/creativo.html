function showImportFromCreditoCreativos() {
  var titleEl = document.getElementById('modalTitle');
  var bodyEl = document.getElementById('modalBody');
  var footerEl = document.getElementById('modalFooter');
  if (!titleEl || !bodyEl || !footerEl) return;
  titleEl.textContent = 'Importar desde Crédito';
  bodyEl.innerHTML = '<p style="color:var(--color-text-muted);margin-bottom:1rem">Cargando clientes de Crédito…</p>';
  footerEl.innerHTML = '<button class="btn btn-secondary" onclick="openClientModal()">← Volver</button>';
  if (!supabase) {
    bodyEl.innerHTML = '<p style="color:var(--color-text-muted)">No hay conexión. Los clientes de Crédito se cargan desde la misma base de datos.</p>';
    return;
  }
  var idsInCreativos = window.creditoIdsInCreativos || [];
  supabase.from('clientes').select('id, name, biz, emails').order('name').then(function(r) {
    if (r.error) {
      bodyEl.innerHTML = '<p style="color:var(--color-error)">Error al cargar: ' + (r.error.message || '') + '</p>';
      return;
    }
    var list = (r.data || []).filter(function(c) { return idsInCreativos.indexOf(c.id) === -1; });
    window._creditoImportListCreativos = list;
    if (list.length === 0) {
      bodyEl.innerHTML = '<p style="color:var(--color-text-muted)">Todos los clientes de Crédito ya están en Creativos, o no hay clientes en Crédito.</p>';
      return;
    }
    var html = '<p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:1rem">Elige un cliente para importarlo a Creativos (se vinculará por Crédito):</p><div style="display:flex;flex-direction:column;gap:0.5rem;max-height:320px;overflow-y:auto">';
    list.forEach(function(c) {
      var firstEmail = (c.emails && (Array.isArray(c.emails) && c.emails[0]) ? c.emails[0] : (typeof c.emails === 'string' ? c.emails : '')) || '';
      var name = (c.name || '').replace(/</g, '&lt;');
      var company = (c.biz || '').replace(/</g, '&lt;');
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem;background:var(--color-surface-offset);border-radius:var(--radius-md)"><div><strong>' + name + '</strong>' + (company ? ' — ' + company : '') + (firstEmail ? '<br><span style="font-size:var(--text-xs);color:var(--color-text-muted)">' + String(firstEmail).replace(/</g, '&lt;') + '</span>' : '') + '</div><button type="button" class="btn btn-primary" style="padding:4px 12px" onclick="importClienteFromCreditoCreativos(\'' + c.id + '\')">Importar</button></div>';
    });
    html += '</div>';
    bodyEl.innerHTML = html;
  });
}
function importClienteFromCreditoCreativos(creditoId) {
  if (!supabase) return;
  var list = window._creditoImportListCreativos || [];
  var c = list.find(function(x) { return x.id === creditoId; });
  if (!c) { showToast('error', 'Cliente no encontrado'); return; }
  var firstEmail = (c.emails && (Array.isArray(c.emails) && c.emails[0]) ? c.emails[0] : (typeof c.emails === 'string' ? c.emails : '')) || '';
  var row = {
    credito_client_id: creditoId,
    name: c.name || 'Cliente Crédito',
    company: c.biz || c.name || '',
    email: firstEmail
  };
  supabase.from('creativos_clientes').insert(row).then(function(r) {
    if (r.error) { showToast('error', r.error.message || 'Error al importar'); return; }
    showToast('success', 'Cliente importado desde Crédito');
    closeModal();
    reloadCreativosData(function() { renderPage(currentPage); });
  });
}
function saveClient() {
  var name = document.getElementById('clientName').value.trim();
  var company = document.getElementById('clientCompany').value.trim();
  var email = document.getElementById('clientEmail').value.trim();
  if (!name || !company) { showToast('error', 'Nombre y empresa son requeridos'); return; }
  if (supabase) {
    if (editingId) {
      supabase.from('creativos_clientes').update({ name: name, company: company, email: email }).eq('id', editingId).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Cliente actualizado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    } else {
      supabase.from('creativos_clientes').insert({ name: name, company: company, email: email }).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Cliente agregado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    }
  } else {
    if (editingId) {
      var c = D.clients.find(function(cl) { return cl.id === editingId; });
      if (c) { c.name = name; c.company = company; c.email = email; }
      showToast('success', 'Cliente actualizado');
    } else {
      D.clients.push({ id: uid(), name: name, company: company, email: email, createdAt: new Date().toISOString() });
      showToast('success', 'Cliente agregado');
    }
    closeModal(); renderPage(currentPage);
  }
}

  if (supabase) {
    if (editingId) {
      supabase.from('creativos_productos').update({ name: name, category: category }).eq('id', editingId).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Producto actualizado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    } else {
      supabase.from('creativos_productos').insert({ name: name, category: category }).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Producto agregado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    }
  } else {
    if (editingId) {
      var p = D.products.find(function(pr) { return pr.id === editingId; });
      if (p) { p.name = name; p.category = category; }
      showToast('success', 'Producto actualizado');
    } else {
      D.products.push({ id: uid(), name: name, category: category, createdAt: new Date().toISOString() });
      showToast('success', 'Producto agregado');
    }
    closeModal(); renderPage(currentPage);
  }
}

// EDITOR MODAL
function openEditorModal(id) {
  const e = id ? D.editors.find(ed => ed.id === id) : null;
  editingId = id || null; editingType = 'editor';
  const body = `
    <div class="form-group"><label class="form-label">Nombre Completo</label><input class="form-input" id="editorName" value="${e ? esc(e.name) : ''}" placeholder="Ej: Javier Quispe"></div>
    <div class="form-group"><label class="form-label">Especialidad</label><select class="form-select" id="editorSpecialty">${EDITOR_SPECIALTIES.map(s => `<option ${e && e.specialty === s ? 'selected':''}>${s}</option>`).join('')}</select></div>
  `;
  const footer = `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEditor()">${e ? 'Guardar Cambios' : 'Agregar Editor'}</button>`;
  openModal(e ? 'Editar Editor' : 'Nuevo Editor', body, footer);
}
function saveEditor() {
  var name = document.getElementById('editorName').value.trim();
  var specialty = document.getElementById('editorSpecialty').value;
  if (!name) { showToast('error', 'El nombre es requerido'); return; }
  if (supabase) {
    if (editingId) {
      supabase.from('creativos_editores').update({ name: name, specialty: specialty }).eq('id', editingId).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Editor actualizado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    } else {
      supabase.from('creativos_editores').insert({ name: name, specialty: specialty }).then(function(r) {
        if (r.error) { showToast('error', r.error.message || 'Error al guardar'); return; }
        showToast('success', 'Editor agregado');
        closeModal();
        reloadCreativosData(function() { renderPage(currentPage); });
      });
    }
  } else {
    if (editingId) {
      var e = D.editors.find(function(ed) { return ed.id === editingId; });
      if (e) { e.name = name; e.specialty = specialty; }
      showToast('success', 'Editor actualizado');
    } else {
      D.editors.push({ id: uid(), name: name, specialty: specialty, createdAt: new Date().toISOString() });
      showToast('success', 'Editor agregado');
    }
    closeModal(); renderPage(currentPage);
  }
}

// EDITOR DETAIL (drawer)
function openEditorDetail(id) {
  const e = D.editors.find(ed => ed.id === id);
  if (!e) return;
  const projects = D.projects.filter(p => p.editorId === id);
  const completed = projects.filter(p => p.cpa !== 'pendiente');
  const muyBueno = completed.filter(p => p.cpa === 'muy_bueno').length;
  const bueno = completed.filter(p => p.cpa === 'bueno').length;
  const malo = completed.filter(p => p.cpa === 'malo').length;

  // Platform distribution for this editor
  const platCounts = {};
  projects.forEach(p => { platCounts[p.platform] = (platCounts[p.platform]||0)+1; });
  const plats = Object.entries(platCounts).sort((a,b)=>b[1]-a[1]);
  const maxPlat = plats.length > 0 ? plats[0][1] : 1;

  document.getElementById('drawerTitle').textContent = e.name;
  const body = document.getElementById('drawerBody');
  body.innerHTML = `
    <div class="project-info-grid">
      <div class="project-info-item"><div class="project-info-label">Especialidad</div><div class="project-info-value">${esc(e.specialty)}</div></div>
      <div class="project-info-item"><div class="project-info-label">Proyectos Totales</div><div class="project-info-value">${projects.length}</div></div>
      <div class="project-info-item"><div class="project-info-label">Evaluados</div><div class="project-info-value">${completed.length}</div></div>
      <div class="project-info-item"><div class="project-info-label">Tasa de Éxito</div><div class="project-info-value">${completed.length > 0 ? Math.round((muyBueno+bueno)/completed.length*100) : 0}%</div></div>
    </div>

    <div style="margin-bottom:var(--space-5);">
      <h3 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);">Distribución CPA</h3>
      <div class="editor-detail-chart">
        <div class="chart-bars">
          <div class="chart-bar-wrapper">
            <div class="chart-bar green" style="height:${completed.length > 0 ? Math.max(muyBueno/completed.length*100, 4) : 4}%;" data-tooltip="Muy Bueno: ${muyBueno}"></div>
            <div class="chart-bar-label">MB</div>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar blue" style="height:${completed.length > 0 ? Math.max(bueno/completed.length*100, 4) : 4}%;" data-tooltip="Bueno: ${bueno}"></div>
            <div class="chart-bar-label">B</div>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height:${completed.length > 0 ? Math.max(malo/completed.length*100, 4) : 4}%;background:var(--color-error);" data-tooltip="Malo: ${malo}"></div>
            <div class="chart-bar-label">M</div>
          </div>
        </div>
      </div>
    </div>

    ${plats.length > 0 ? `
    <div style="margin-bottom:var(--space-5);">
      <h3 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);">Plataformas</h3>
      <div class="bar-chart">
        ${plats.map(p => `<div class="bar-chart-item">
          <div class="bar-chart-label"><span>${esc(p[0])}</span><span>${p[1]}</span></div>
          <div class="bar-chart-track"><div class="bar-chart-fill" style="width:${Math.round(p[1]/maxPlat*100)}%;"></div></div>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <h3 style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);">Proyectos</h3>
    ${projects.length > 0 ? projects.map(p => {
      const stage = getProjectStage(p);
      return `<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--color-divider);cursor:pointer;" onclick="openProjectDrawer('${p.id}')">
        <div style="flex:1;min-width:0;">
          <div style="font-size:var(--text-sm);font-weight:500;">${esc(p.name)}</div>
          <div style="font-size:var(--text-xs);color:var(--color-text-muted);">${esc(p.platform)} · ${esc(p.type)}</div>
        </div>
        <span class="badge ${CPA_BADGES[p.cpa]} badge-sm"><span class="badge-dot"></span>${CPA_LABELS[p.cpa]}</span>
      </div>`;
    }).join('') : '<div style="color:var(--color-text-faint);font-size:var(--text-sm);text-align:center;padding:var(--space-4);">Sin proyectos asignados</div>'}
  `;

  document.getElementById('drawerOverlay').classList.add('active');
  document.getElementById('projectDrawer').classList.add('active');
}

/* ============================================
   DELETE OPERATIONS
   ============================================ */
function deleteProject(id) {
  if (!confirm('¿Eliminar este proyecto?')) return;
  D.projects = D.projects.filter(p => p.id !== id);
  showToast('success', 'Proyecto eliminado');
  closeDrawer(); renderPage(currentPage);
}
function deleteClient(id) {
  if (D.projects.some(p => p.clientId === id)) {
    showToast('error', 'No se puede eliminar: tiene proyectos asociados');
    return;
  }
  if (!confirm('¿Eliminar este cliente?')) return;
  D.clients = D.clients.filter(c => c.id !== id);
  showToast('success', 'Cliente eliminado');
  renderPage(currentPage);
}
function deleteProduct(id) {
  if (D.projects.some(p => p.productId === id)) {
    showToast('error', 'No se puede eliminar: tiene proyectos asociados');
    return;
  }
  if (!confirm('¿Eliminar este producto?')) return;
  D.products = D.products.filter(p => p.id !== id);
  showToast('success', 'Producto eliminado');
  renderPage(currentPage);
}
function deleteEditor(id) {
  if (D.projects.some(p => p.editorId === id)) {
    showToast('error', 'No se puede eliminar: tiene proyectos asociados');
    return;
  }
  if (!confirm('¿Eliminar este editor?')) return;
  D.editors = D.editors.filter(e => e.id !== id);
  showToast('success', 'Editor eliminado');
  renderPage(currentPage);
}

/* ============================================
   EXPORT
   ============================================ */
function exportData() {
  const json = JSON.stringify(D, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `videoforge-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('success', 'Datos exportados como JSON');
}

/* ============================================
   TOAST SYSTEM
   ============================================ */
function showToast(type, message, duration = 3500) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;

  const icons = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  };

  toast.innerHTML = `
    <div class="toast-icon">${icons[type] || icons.info}</div>
    <div class="toast-message">${esc(message)}</div>
    <div class="toast-progress" style="width:100%;"></div>
  `;

  container.appendChild(toast);
  requestAnimationFrame(() => {
    toast.classList.add('show');
    const progress = toast.querySelector('.toast-progress');
    progress.style.transitionDuration = duration + 'ms';
    requestAnimationFrame(() => { progress.style.width = '0%'; });
  });

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 350);
  }, duration);
}

/* ============================================
   UTILITY FUNCTIONS
   ============================================ */
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderEmptyState(title, text, action, btnText) {
  return `<div class="empty-state">
    <div class="empty-state-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="3"/>
        <path d="m10 8 6 4-6 4z"/>
      </svg>
    </div>
    <h3>${title}</h3>
    <p>${text}</p>
    <button class="btn btn-primary" onclick="${action}">${btnText}</button>
  </div>`;
}

function logActivity(type, projectName, stageName) {
  activityLog.unshift({ type, projectName, stageName: stageName || '', date: new Date().toISOString() });
  if (activityLog.length > 30) activityLog = activityLog.slice(0, 30);
}

function updateNavBadges() {
  const active = D.projects.filter(p => !isProjectComplete(p)).length;
  const badge = document.getElementById('navPipelineBadge');
  if (badge) badge.textContent = active;
}

function animateCounters() {
  document.querySelectorAll('.counter-animate[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    const duration = 800;
    const start = performance.now();
    function step(ts) {
      const elapsed = ts - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(eased * target) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function animateBarCharts() {
  document.querySelectorAll('.bar-chart-fill[data-width]').forEach(el => {
    setTimeout(() => { el.style.width = el.dataset.width + '%'; }, 100);
  });
}

/* ============================================
   SEARCH
   ============================================ */
document.getElementById('globalSearch').addEventListener('input', function(e) {
  currentSearchTerm = e.target.value;
  if (currentPage === 'pipeline' || currentPage === 'projects' || currentPage === 'dashboard') {
    renderPage(currentPage);
  }
});

/* ============================================
   MOBILE SIDEBAR
   ============================================ */
document.getElementById('mobileHamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('active');
});
document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

/* ============================================
   DRAWER OVERLAY CLICK
   ============================================ */
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

/* ============================================
   MODAL OVERLAY CLICK
   ============================================ */
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */
document.addEventListener('keydown', function(e) {
  // Esc closes modals/drawers
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('active')) { closeModal(); return; }
    if (document.getElementById('projectDrawer').classList.contains('active')) { closeDrawer(); return; }
    if (document.getElementById('sidebar').classList.contains('open')) { closeMobileSidebar(); return; }
  }
  // Don't trigger shortcuts if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  // / for search
  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
  // N for new project
  if (e.key === 'n' || e.key === 'N') {
    if (!document.getElementById('modalOverlay').classList.contains('active')) {
      e.preventDefault();
      openNewProjectModal();
    }
  }
});

/* ============================================
   HASH ROUTING
   ============================================ */
function handleHash() {
  const hash = window.location.hash.replace('#','');
  if (hash === 'portfolio') {
    renderPortfolioPage();
  } else {
    document.getElementById('portfolioPage').style.display = 'none';
    document.getElementById('dashboardApp').style.display = 'grid';
    document.getElementById('mobileHamburger').style.display = '';
  }
}
window.addEventListener('hashchange', handleHash);

/* ============================================
   INITIALIZE
   ============================================ */
function initApp() {
  activityLog = [];
  handleHash();
  if (window.location.hash !== '#portfolio') navigateTo('dashboard');
}
function doCreativosInitialLoad() {
  if (!supabase) return;
  loadCreativosData().then(function(data) {
    if (data) {
      D.clients = data.clients;
      D.products = data.products;
      D.editors = data.editors;
      D.projects = data.projects;
      if (data.creditoIdsInCreativos) window.creditoIdsInCreativos = data.creditoIdsInCreativos;
      console.log('[Creativos] Clientes cargados:', (data.clients || []).length);
    }
    initApp();
  }).catch(function(e) { console.warn('[Creativos] loadCreativosData:', e); initApp(); });
}
function initCreativosAvatar() {
  var key = 'creativos_avatar_url';
  var imgEl = document.getElementById('creativosUserAvatarImg');
  var iniEl = document.getElementById('creativosUserAvatarIniciales');
  var inp = document.getElementById('creativosAvatarInput');
  if (!inp || !imgEl || !iniEl) return;
  function applyPhoto(dataUrl) {
    if (!dataUrl) return;
    try { localStorage.setItem(key, dataUrl); } catch (e) {}
    imgEl.src = dataUrl;
    imgEl.style.display = 'block';
    iniEl.style.display = 'none';
  }
  var stored = localStorage.getItem(key);
  if (stored) { imgEl.src = stored; imgEl.style.display = 'block'; iniEl.style.display = 'none'; }
  inp.onchange = function() {
    var f = this.files && this.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function() { applyPhoto(r.result); };
    r.readAsDataURL(f);
    this.value = '';
  };
  var block = document.querySelector('.sidebar-footer-user');
  if (block) block.addEventListener('click', function(e) { if (!e.target.closest('.theme-toggle-btn')) inp.click(); });
}

window.__creativosTriggerLoad = doCreativosInitialLoad;
if (supabase) {
  doCreativosInitialLoad();
} else {
  initApp();
  var t = setInterval(function() { if (supabase) { clearInterval(t); doCreativosInitialLoad(); } }, 400);
  setTimeout(function() { clearInterval(t); }, 8000);
}
initCreativosAvatar();
</script>
