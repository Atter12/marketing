<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Videos Pro | Holistic Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fefcf9;
      --tx: #2d2518;
      --muted: #8a7e6b;
      --pri: #f97316;
      --pri-dark: #ea580c;
      --card: #fff;
      --bdr: #f0e6d9;
      --radius: 16px;
      --shadow: 0 8px 28px rgba(45, 37, 24, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 420px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--pri-dark);
      background: #fff7ed;
      border: 1px solid rgba(249, 115, 22, 0.25);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">Acceso directo</div>
    <h1>Videos Pro</h1>
    <p>Esta página solo se abre con el enlace. Aquí definiremos el contenido cuando sigamos.</p>
  </div>
</body>
</html>
