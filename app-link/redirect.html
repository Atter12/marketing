<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo...</title>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f7f8fc; color: #1a1a2e; font-family: Inter, system-ui, sans-serif; text-align: center; padding: 20px; }
    .s { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #3b5bdb; border-radius: 50%; animation: r .7s linear infinite; margin: 0 auto 14px; }
    @keyframes r { to { transform: rotate(360deg); } }
    .err { color: #ef4444; max-width: 360px; }
  </style>
</head>
<body>
  <script>
    window.SUPABASE_URL = window.SUPABASE_URL || '__SUPABASE_URL__';
    window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '__SUPABASE_ANON_KEY__';
  </script>
  <script src="/app-link/config.js"></script>
  <div id="app">
    <div class="s"></div>
    <p>Redirigiendo...</p>
  </div>
  <script type="module">
    (function() {
      console.log('[redirect] location:', { href: location.href, pathname: location.pathname, search: location.search });
      const SUPABASE_URL = window.SUPABASE_URL || '';
      const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '';
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        console.error('[redirect] Falta config Supabase');
        document.getElementById('app').innerHTML = '<p class="err">Configuración faltante: SUPABASE_URL y SUPABASE_ANON_KEY.</p>';
        return;
      }
      const params = new URLSearchParams(window.location.search);
      let slug = (params.get('slug') || '').trim().replace(/[^a-zA-Z0-9\-_]/g, '') || null;
      if (!slug && location.pathname.indexOf('/go/') === 0) {
        const match = location.pathname.match(/^\/go\/([a-zA-Z0-9\-_]+)$/);
        if (match) slug = match[1];
      }
      console.log('[redirect] slug:', slug, '(from query:', params.get('slug'), ', pathname:', location.pathname, ')');
      if (!slug) {
        document.getElementById('app').innerHTML = '<p class="err">Falta el parámetro slug en la URL. pathname=' + (location.pathname || '') + ' search=' + (location.search || '') + '</p>';
        return;
      }
      async function getLocation() {
        try {
          const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(2000) });
          const d = await r.json();
          return {
            country: d.country_code || d.country_name || null,
            region: d.region || d.region_code || null,
            city: d.city || null
          };
        } catch (e) { return { country: null, region: null, city: null }; }
      }
      async function recordClick(supabase, slug, linkIndex, targetUrl) {
        const loc = await getLocation();
        try {
          await supabase.from('link_clicks').insert({
            slug,
            link_index: linkIndex,
            target_url: targetUrl,
            country: loc.country,
            region: loc.region,
            city: loc.city
          });
        } catch (e) { console.warn('[redirect] No se pudo registrar clic', e); }
      }
      async function run() {
        console.log('[redirect] Buscando config para slug:', slug);
        const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: row, error } = await supabase.from('link_configs').select('mode, config').eq('slug', slug).maybeSingle();
        console.log('[redirect] Supabase:', { error: error?.message, hasRow: !!row });
        if (error || !row) {
          document.getElementById('app').innerHTML = '<p class="err">Link no encontrado.</p>';
          return;
        }
        if (row.mode === 'common') {
          const url = row.config && row.config.url;
          if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
            recordClick(supabase, slug, 0, url).then(() => window.location.replace(url));
            return;
          }
          document.getElementById('app').innerHTML = '<p class="err">Enlace sin destino configurado.</p>';
          return;
        }
        if (row.mode === 'rotation' && row.config && Array.isArray(row.config.links) && row.config.links.length > 0) {
          const links = row.config.links.map(l => ({ url: l.url, clicks: Math.max(1, parseInt(l.clicks) || 1) }));
          const total = links.reduce((s, x) => s + x.clicks, 0);
          const { data: posData, error: posErr } = await supabase.rpc('next_rotation_position', { p_slug: slug });
          if (posErr || posData == null) {
            document.getElementById('app').innerHTML = '<p class="err">Error al obtener posición de rotación. Ejecuta el SQL de rotación global en Supabase.</p>';
            return;
          }
          const pos = typeof posData === 'number' ? posData % total : 0;
          let acc = 0, target = links[0].url, linkIndex = 0;
          for (let i = 0; i < links.length; i++) {
            acc += links[i].clicks;
            if (pos < acc) { target = links[i].url; linkIndex = i; break; }
          }
          if (target && (target.startsWith('http://') || target.startsWith('https://'))) {
            await recordClick(supabase, slug, linkIndex, target);
            window.location.replace(target);
            return;
          }
        }
        document.getElementById('app').innerHTML = '<p class="err">Link no configurado correctamente.</p>';
      }
      run();
    })();
  </script>
</body>
</html>
